<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512" role="img" aria-labelledby="title desc">
  <title id="title">SXT'EKW Neural Weaver Logo</title>
  <desc id="desc">A dark blue logo with a gold circular crest and neural weave motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0b1f3b" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="512" fill="url(#bg)" />

  <g opacity="0.5" stroke="#2dd4bf" fill="none">
    <path d="M100 120 L180 120 L240 180 L240 260" stroke-width="4" />
    <path d="M924 160 L860 160 L820 200 L820 248" stroke-width="4" />
    <circle cx="240" cy="260" r="8" fill="#2dd4bf" />
    <circle cx="820" cy="248" r="8" fill="#2dd4bf" />
  </g>

  <g text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <text x="512" y="82" fill="url(#gold)" font-size="76" font-weight="800" letter-spacing="2">SXT'EKW</text>
    <text x="512" y="122" fill="#f8e7ba" font-size="38" letter-spacing="6">NEURAL WEAVER</text>
  </g>

  <g transform="translate(512 312)">
    <circle r="152" fill="#0f2749" stroke="url(#gold)" stroke-width="10" filter="url(#softGlow)" />
    <circle r="132" fill="#122b4f" stroke="#f8e7ba" stroke-width="4" />

    <path d="M-34 -84 L8 -56 L42 -74 L58 -30 L30 18 L-12 34 L-52 18 L-58 -28 Z" fill="#7c3f1d" stroke="#f8e7ba" stroke-width="3" />
    <path d="M-10 -20 L14 -8 L12 18 L-12 26 L-24 8 Z" fill="#0e7490" stroke="#a7f3d0" stroke-width="2" />

    <g stroke="#60a5fa" stroke-width="3">
      <line x1="34" y1="-58" x2="94" y2="-26" />
      <line x1="94" y1="-26" x2="102" y2="34" />
      <line x1="102" y1="34" x2="40" y2="68" />
      <line x1="40" y1="68" x2="10" y2="16" />
      <line x1="10" y1="16" x2="34" y2="-58" />
      <line x1="34" y1="-58" x2="102" y2="34" />
    </g>
    <g fill="#fde68a">
      <circle cx="34" cy="-58" r="5" />
      <circle cx="94" cy="-26" r="5" />
      <circle cx="102" cy="34" r="5" />
      <circle cx="40" cy="68" r="5" />
      <circle cx="10" cy="16" r="5" />
    </g>
  </g>
</svg>
