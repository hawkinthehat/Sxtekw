<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | Legacy</title>
    <style>
        /* COLOR PALETTE: BLACK (000), RED (f43f5e), YELLOW (fbbf24) */
        :root { --bg: #000; --teal: #0d9488; --gold: #fbbf24; --red: #f43f5e; --text: #f1f5f9; --off: #222; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; opacity: 0; transition: opacity 0.4s; }
        .active { display: flex; opacity: 1; }

        /* 128 BPM HEARTBEAT */
        @keyframes beat {
            0% { transform: scale(1); filter: brightness(1); }
            14% { transform: scale(1.1); filter: brightness(1.5); box-shadow: 0 0 30px var(--teal); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .logo-pulse { width: 90px; height: 90px; border: 2px solid var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: beat 0.468s infinite; margin-bottom: 25px; }

        /* HOME BUTTONS */
        .launch-btn { width: 280px; padding: 20px; margin: 10px 0; border: 1px solid #111; background: #050505; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .btn-title { font-size: 1.1rem; letter-spacing: 6px; font-weight: 900; color: var(--teal); }
        .phonetic-md { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); margin-top: 5px; }

        /* LOGIC & FEATHER */
        #logic-q { font-size: 1.8rem; color: var(--gold); margin-bottom: 20px; text-align: center; font-weight: bold; }
        #logic-input { background: none; border-bottom: 2px solid var(--gold); border-top:none; border-left:none; border-right:none; color: white; width: 80%; text-align: center; font-size: 2.2rem; outline: none; text-transform: uppercase; }
        #feather { position: absolute; width: 100px; height: 10px; background: var(--teal); border-radius: 20px; filter: blur(2px); box-shadow: 0 0 20px var(--teal); display: none; transition: all 1.2s cubic-bezier(0.65, 0, 0.35, 1); z-index: 100; }

        /* EXPLOSION ANIMATION */
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            50% { transform: scale(1.5); opacity: 0.5; filter: blur(10px); color: var(--red); }
            100% { transform: scale(3); opacity: 0; filter: blur(50px); }
        }
        .exploding { animation: explode 0.8s forwards; }

        .btn-hilu { position: absolute; top: 30px; left: 30px; background: none; border: 1px solid #222; color: #444; padding: 8px 15px; font-size: 0.55rem; letter-spacing: 2px; z-index: 1000; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="logo-pulse"><span style="color: var(--gold); font-weight: 900; font-size: 0.8rem;">SXT’EKW</span></div>
        <div class="phonetic-md" style="margin-bottom: 40px; opacity: 0.8;">[ suh-t-ekw ]</div>

        <div class="launch-btn" onclick="startSection('paxwad')">
            <span class="btn-title">P’ÁX̌WAD</span>
            <span class="phonetic-md">[ pah-hwah-d ] SPARK</span>
        </div>
        <div class="launch-btn" onclick="startSection('weave')">
            <span class="btn-title">KW’ÉTL’EN</span>
            <span class="phonetic-md">[ kw-et-lun ] WEAVE</span>
        </div>
        <div class="launch-btn" onclick="startSection('kwelap')">
            <span class="btn-title">KW’ÉLAP</span>
            <span class="phonetic-md">[ kw-ay-lap ] HALT</span>
        </div>
    </div>

    <div id="screen-paxwad" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div id="hijack-layer" style="text-align: center; width: 85%;">
            <div id="logic-q"></div>
            <input type="text" id="logic-input" autocomplete="off" oninput="checkLogic()">
            <div id="prog-dots" style="margin-top: 30px; font-size: 1.2rem; letter-spacing: 12px; color: var(--teal); opacity: 0.2;">● ● ●</div>
        </div>
        <div id="feather" onclick="hitFeather()"></div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="z-index: 100; text-align: center; position: absolute; top: 80px; pointer-events: none;">
            <h2 id="animal-name" style="color: var(--teal); letter-spacing: 6px; margin:0;"></h2>
            <div id="animal-phonetic" class="phonetic-md"></div>
        </div>
        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer"></div>
    </div>

    <div id="screen-kwelap" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div id="halt-container" style="text-align: center; width: 85%;">
            <textarea id="halt-thought" placeholder="TYPE YOUR WORRY..." onkeypress="handleHalt(event)" style="background: none; border: 1px solid #111; color: white; width: 100%; height: 120px; padding: 20px; text-align: center; font-size: 1.1rem; outline: none;"></textarea>
            <p style="font-size: 0.5rem; color: var(--teal); opacity: 0.4; letter-spacing: 3px; margin-top: 30px;">ENTER TO EXPLODE</p>
        </div>
    </div>

    <script>
        const totems = [
            { name: "SQUW'AL'QUW", phonetic: "[ sk-wahl-koo ] RAVEN", points: [{x:0.5, y:0.2}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.8}, {x:0.5, y:0.2}] },
            { name: "STIQÍYU’", phonetic: "[ stee-kee-yoo ] WOLF", points: [{x:0.2, y:0.4}, {x:0.5, y:0.2}, {x:0.8, y:0.4}, {x:0.7, y:0.7}, {x:0.3, y:0.7}, {x:0.2, y:0.4}] }
        ];

        let currentLevel = 0, isDrawing = false, userPath = [], correctCount = 0, currentAns = "", sparkCount = 0;

        function startSection(type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${type}`).classList.add('active');
            if(type === 'paxwad') initLogic();
            if(type === 'weave') initWeave();
        }

        function exitToHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-home').classList.add('active');
            document.getElementById('feather').style.display = 'none';
            document.getElementById('halt-container').style.display = 'block';
        }

        /* --- LOGIC HIJACK (OLD VERSION RESTORED) --- */
        const logicTasks = [
            { q: () => { const a=Math.floor(Math.random()*9)+4, b=Math.floor(Math.random()*8)+3; return {txt:`${a} x ${b}`, ans:(a*b).toString()}; }},
            { q: () => { const words=["RAVEN","CEDAR","SALMON","CANOE"]; const w=words[Math.floor(Math.random()*words.length)]; return {txt:`REVERSE: ${w}`, ans:w.split('').reverse().join('')}; }},
            { q: () => { const n=Math.floor(Math.random()*5)+4; return {txt:"● ".repeat(n), ans:n.toString()}; }}
        ];

        function initLogic() {
            correctCount = 0; document.getElementById('hijack-layer').style.display = 'block';
            document.getElementById('feather').style.display = 'none';
            document.getElementById('prog-dots').style.opacity = 0.2;
            nextTask();
        }

        function nextTask() {
            const t = logicTasks[Math.floor(Math.random()*logicTasks.length)].q();
            document.getElementById('logic-q').innerText = t.txt;
            currentAns = t.ans; document.getElementById('logic-input').value = "";
            document.getElementById('logic-input').focus();
        }

        function checkLogic() {
            const val = document.getElementById('logic-input').value.toUpperCase();
            if (val === currentAns) {
                correctCount++; if (navigator.vibrate) navigator.vibrate(40);
                if (correctCount >= 3) startFeather();
                else { document.getElementById('prog-dots').style.opacity = (correctCount/3)+0.2; setTimeout(nextTask, 300); }
            }
        }

        /* --- EMDR FEATHER --- */
        function startFeather() {
            document.getElementById('hijack-layer').style.display = 'none';
            document.getElementById('halt-container').style.display = 'none';
            const f = document.getElementById('feather'); f.style.display = 'block';
            sparkCount = 0; moveFeather();
        }

        let fSide = 0;
        function moveFeather() {
            const f = document.getElementById('feather');
            fSide = fSide === 0 ? 1 : 0;
            f.style.left = fSide === 0 ? '10%' : '75%'; f.style.top = '50%';
        }

        function hitFeather() {
            sparkCount++; if (navigator.vibrate) navigator.vibrate(20);
            if(sparkCount >= 12) exitToHome(); else moveFeather();
        }

        /* --- ORIGINAL WEAVE (YELLOW LINES) --- */
        function initWeave() {
            const canvas = document.getElementById('weave-canvas');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            document.getElementById('animal-name').innerText = totems[currentLevel].name;
            document.getElementById('animal-phonetic').innerText = totems[currentLevel].phonetic;
            userPath = [];
            const layer = document.getElementById('touch-layer');
            layer.onpointerdown = (e) => { isDrawing = true; userPath.push({x: e.clientX, y: e.clientY}); };
            layer.onpointermove = (e) => { if(isDrawing) userPath.push({x: e.clientX, y: e.clientY}); };
            layer.onpointerup = () => { isDrawing = false; };
            renderWeave();
        }

        function renderWeave() {
            const canvas = document.getElementById('weave-canvas');
            if(!canvas || !document.getElementById('screen-weave').classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);

            // Anchors
            totems[currentLevel].points.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x * canvas.width, p.y * canvas.height, 4, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(251, 191, 36, 0.5)'; ctx.fill();
            });

            // Drawing the Yellow Line
            if(userPath.length > 1) {
                ctx.strokeStyle = 'var(--gold)'; ctx.lineWidth = 3; ctx.beginPath();
                userPath.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
            requestAnimationFrame(renderWeave);
        }

        /* --- HALT: EXPLOSION --- */
        function handleHalt(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const box = document.getElementById('halt-thought');
                box.classList.add('exploding');
                if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
                setTimeout(() => { 
                    box.classList.remove('exploding');
                    box.value = "";
                    startFeather(); // Transition to EMDR after explosion
                }, 800);
            }
        }
    </script>
</body>
</html>
