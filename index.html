<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | The Quiet</title>
    <style>
        :root {
            --bg: #020617; /* Pitch Black for focus */
            --jade: #00a36c;
            --teal: #2dd4bf;
            --text: #f1f5f9;
            --gold: #fbbf24;
            --red: #f43f5e;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevents accidental iPad swipes */
            -webkit-user-select: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .active { display: flex; opacity: 1; }

        /* UI ELEMENTS */
        .btn-hilu {
            position: absolute; top: 30px; left: 30px;
            background: rgba(0, 163, 108, 0.1);
            border: 1px solid var(--jade);
            color: var(--jade);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            z-index: 1000;
            cursor: pointer;
        }

        .phonetic { font-size: 0.6rem; opacity: 0.6; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        .instr-card {
            background: rgba(0, 163, 108, 0.05);
            border: 1px solid rgba(0, 163, 108, 0.3);
            padding: 20px;
            border-radius: 20px;
            max-width: 280px;
            text-align: center;
            margin-bottom: 20px;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #touch-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
        }

        .home-title {
            letter-spacing: 12px;
            color: var(--jade);
            font-weight: 900;
            margin-bottom: 0;
        }

        .home-subtitle {
            margin-top: 50px;
            width: 80%;
            max-width: 400px;
        }

        .menu-btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .menu-btn-primary {
            background: var(--jade);
            color: var(--bg);
            border: none;
            margin-bottom: 15px;
        }

        .menu-btn-secondary {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .menu-btn-sub {
            display: block;
        }

        .menu-btn-sub-dark {
            color: var(--bg);
        }

        .menu-btn-sub-gold {
            color: var(--gold);
        }

        .home-footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.5rem;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        #weave-header {
            z-index: 5;
            text-align: center;
            position: absolute;
            top: 100px;
            pointer-events: none;
        }

        #animal-name {
            color: var(--jade);
            letter-spacing: 8px;
            margin: 0;
        }

        #paxwad-rule-title {
            color: var(--gold);
            font-weight: 900;
        }

        #spark-target {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--jade);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--jade);
            cursor: pointer;
        }

        #spark-count {
            position: absolute;
            bottom: 50px;
            color: var(--jade);
            font-size: 0.8rem;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1 class="home-title">SXT’EKW</h1>
        <p class="phonetic">THE QUIET [ suh-t-ekw ]</p>

        <div class="home-subtitle">
            <button type="button" class="menu-btn menu-btn-primary" onclick="startWeave()">
                KW’ÉTL’EN <span class="phonetic menu-btn-sub menu-btn-sub-dark">[ THE WEAVE ]</span>
            </button>
            <button type="button" class="menu-btn menu-btn-secondary" onclick="startPaxwad()">
                P’ÁX̌WAD <span class="phonetic menu-btn-sub menu-btn-sub-gold">[ THE SPARK ]</span>
            </button>
        </div>
        <div class="home-footer">FOR JADE</div>
    </div>

    <div id="screen-weave" class="screen">
        <button type="button" class="btn-hilu" onclick="exitToHome()">HÍLU [ DEPART ]</button>

        <div id="weave-header">
            <h2 id="animal-name">READY</h2>
            <p id="animal-phonetic" class="phonetic"></p>
        </div>

        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer" onmousedown="startLine(event)" onmousemove="drawLine(event)" onmouseup="endLine()" ontouchstart="startLine(event)" ontouchmove="drawLine(event)" ontouchend="endLine()"></div>
    </div>

    <div id="screen-paxwad" class="screen">
        <button type="button" class="btn-hilu" onclick="exitToHome()">HÍLU [ DEPART ]</button>

        <div id="paxwad-instr" class="instr-card">
            <span id="paxwad-rule-title">STILLNESS RULE:</span><br>
            Keep your head still.<br>Follow the spark with eyes only.
        </div>
        <div id="spark-target" onclick="hitSpark()"></div>
        <div id="spark-count">SYNCS: 0/10</div>
    </div>

    <script>
        const screens = ['screen-home', 'screen-weave', 'screen-paxwad'];

        function show(id) {
            screens.forEach((s) => document.getElementById(s).classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');
        }

        function exitToHome() {
            if (navigator.vibrate) navigator.vibrate(20);
            show('screen-home');
        }

        // --- WEAVING LOGIC (STARS) ---
        const constellationData = [
            { name: "SQUWAL'QUW", phon: "SK-WALL-KW", stars: [{ x: 0.5, y: 0.3 }, { x: 0.4, y: 0.5 }, { x: 0.6, y: 0.5 }, { x: 0.5, y: 0.7 }] },
            { name: "STIQÍYU’", phon: "STEE-KEE-YOO", stars: [{ x: 0.2, y: 0.4 }, { x: 0.4, y: 0.3 }, { x: 0.6, y: 0.3 }, { x: 0.8, y: 0.4 }, { x: 0.5, y: 0.6 }] }
        ];

        let currentLevel = 0;
        const canvas = document.getElementById('weave-canvas');
        const ctx = canvas.getContext('2d');
        const jadeColor = getComputedStyle(document.documentElement).getPropertyValue('--jade').trim() || '#00a36c';
        let drawing = false;
        let lastPoint = null;

        function startWeave() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateAnimalText();
            show('screen-weave');
            requestAnimationFrame(animateStars);
        }

        function updateAnimalText() {
            const data = constellationData[currentLevel];
            document.getElementById('animal-name').innerText = data.name;
            document.getElementById('animal-phonetic').innerText = data.phon;
        }

        function animateStars() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle Twinkle Logic
            const time = Date.now() * 0.002;
            const data = constellationData[currentLevel];

            data.stars.forEach((s) => {
                const x = s.x * canvas.width;
                const y = s.y * canvas.height;
                const twinkle = Math.sin(time + x) * 0.3 + 0.7;

                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 163, 108, ${twinkle})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = jadeColor;
                ctx.fill();
            });

            if (document.getElementById('screen-weave').classList.contains('active')) {
                requestAnimationFrame(animateStars);
            }
        }

        function getEventPoint(event) {
            const touch = event.touches && event.touches[0];
            if (touch) return { x: touch.clientX, y: touch.clientY };
            return { x: event.clientX, y: event.clientY };
        }

        function startLine(event) {
            if (event.cancelable) event.preventDefault();
            drawing = true;
            lastPoint = getEventPoint(event);
        }

        function drawLine(event) {
            if (!drawing) return;
            if (event.cancelable) event.preventDefault();
            const nextPoint = getEventPoint(event);
            if (!lastPoint || !nextPoint) return;
            ctx.beginPath();
            ctx.moveTo(lastPoint.x, lastPoint.y);
            ctx.lineTo(nextPoint.x, nextPoint.y);
            ctx.strokeStyle = `rgba(251, 191, 36, 0.85)`;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fbbf24';
            ctx.stroke();
            lastPoint = nextPoint;
        }

        function endLine() {
            drawing = false;
            lastPoint = null;
        }

        // --- SPARK LOGIC (PAXWAD) ---
        let count = 0;
        function startPaxwad() {
            count = 0;
            updateSparkCount();
            moveSpark();
            show('screen-paxwad');
            document.getElementById('paxwad-instr').style.opacity = 1;
        }

        function hitSpark() {
            count++;
            updateSparkCount();
            if (navigator.vibrate) navigator.vibrate(30);
            if (count >= 3) document.getElementById('paxwad-instr').style.opacity = 0;

            if (count >= 10) {
                exitToHome();
            } else {
                moveSpark();
            }
        }

        function moveSpark() {
            const target = document.getElementById('spark-target');
            const x = Math.random() * (window.innerWidth - 100) + 50;
            const y = Math.random() * (window.innerHeight - 100) + 50;
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        function updateSparkCount() {
            document.getElementById('spark-count').innerText = `SYNCS: ${count}/10`;
        }

        // Resize handler for iPad rotation
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
