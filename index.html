<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | Warrior Edition</title>
    <style>
        :root { --bg: #000; --jade: #00A36C; --gold: #fbbf24; --text: #f1f5f9; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .active { display: flex; }

        /* KINETIC LOGO PULSE */
        @keyframes beat {
            0% { transform: scale(1); filter: brightness(1); }
            10% { transform: scale(1.1); filter: brightness(1.5); box-shadow: 0 0 40px var(--jade); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .pulse-active { animation: beat 0.468s infinite; } /* 128 BPM Sync */

        /* BUTTONS */
        .launch-btn { width: 280px; padding: 20px; margin: 10px 0; border: 1px solid #111; background: #050505; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .btn-title { font-size: 1rem; letter-spacing: 6px; font-weight: 900; color: var(--jade); }
        .phonetic { font-size: 0.5rem; letter-spacing: 3px; color: var(--gold); opacity: 0.6; margin: 4px 0; }

        .btn-hilu { position: absolute; top: 30px; left: 30px; background: none; border: 1px solid #222; color: #444; padding: 8px 15px; border-radius: 4px; font-size: 0.55rem; letter-spacing: 2px; z-index: 1000; }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div id="logo-container" class="pulse-active" style="margin-bottom: 50px; text-align: center; border: 2px solid var(--jade); border-radius: 50%; padding: 20px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;">
            <span style="color: var(--gold); font-weight: 900; font-size: 1.5rem;">JA</span>
        </div>
        <h1 style="letter-spacing: 12px; color: var(--jade); font-weight: 900; margin: 0;">SXT’EKW</h1>
        <div class="phonetic" style="margin-bottom: 40px;">[ suh-t-ekw ]</div>

        <div class="launch-btn" onclick="startSection('weave')">
            <span class="btn-title">KW’ÉTL’EN</span>
            <span class="phonetic">[ kw-et-lun ]</span>
        </div>
        <div class="launch-btn" onclick="startSection('paxwad')">
            <span class="btn-title" style="color: var(--gold);">P’ÁX̌WAD</span>
            <span class="phonetic">[ pah-hwah-d ]</span>
        </div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="z-index: 100; text-align: center; position: absolute; top: 100px; pointer-events: none;">
            <h2 id="animal-name" style="color: var(--gold); letter-spacing: 6px; margin:0;"></h2>
            <div id="animal-phonetic" class="phonetic"></div>
        </div>
        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer"></div>
    </div>

    <script>
        const totems = [
            { name: "SQUWAL'QUW", phonetic: "[ sk-wahl-koo ]", points: [{x:0.5, y:0.2}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.8}, {x:0.5, y:0.2}] },
            { name: "STIQÍYU’", phonetic: "[ stee-kee-yoo ]", points: [{x:0.2, y:0.5}, {x:0.4, y:0.3}, {x:0.6, y:0.3}, {x:0.8, y:0.5}, {x:0.5, y:0.8}] }
        ];

        let currentLevel = 0, isDrawing = false, userPath = [];
        const rootStyle = getComputedStyle(document.documentElement);
        const goldColor = rootStyle.getPropertyValue('--gold').trim() || '#fbbf24';

        function startSection(type) {
            const targetScreen = document.getElementById(`screen-${type}`);
            if (!targetScreen) return;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            targetScreen.classList.add('active');
            if(type === 'weave') initWeave();
        }

        function exitToHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-home').classList.add('active');
            isDrawing = false;
            userPath = [];
        }

        function initWeave() {
            const canvas = document.getElementById('weave-canvas');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            document.getElementById('animal-name').innerText = totems[currentLevel].name;
            document.getElementById('animal-phonetic').innerText = totems[currentLevel].phonetic;

            const layer = document.getElementById('touch-layer');
            layer.onpointerdown = (e) => { isDrawing = true; userPath = [{x: e.clientX, y: e.clientY}]; };
            layer.onpointermove = (e) => { if(isDrawing) userPath.push({x: e.clientX, y: e.clientY}); };
            layer.onpointerup = () => { isDrawing = false; };
            layer.onpointercancel = () => { isDrawing = false; };
            renderWeave();
        }

        function renderWeave() {
            const canvas = document.getElementById('weave-canvas');
            if(!canvas || !document.getElementById('screen-weave').classList.contains('active')) return;
            const ctx = canvas.getContext('2d');

            // Subtle "Pulse" fade on the background
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            if(isDrawing && userPath.length > 1) {
                // Glow follows the "beat" logic
                const pulse = Math.sin(Date.now() * 0.013) * 5 + 15;
                ctx.strokeStyle = goldColor;
                ctx.lineWidth = 4;
                ctx.shadowBlur = pulse;
                ctx.shadowColor = goldColor;
                ctx.beginPath();
                userPath.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            requestAnimationFrame(renderWeave);
        }
    </script>
</body>
</html>
