<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | Master</title>
    <style>
        :root {
            --bg: #0f172a;        /* Midnight Slate */
            --bone: #f8fafc;      /* Clean Bone White */
            --accent: #38bdf8;    /* Sky Blue */
            --danger: #ef4444;    /* Crimson */
            --lead: rgba(248, 250, 252, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--bg); color: var(--bone);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden; touch-action: none;
        }

        /* SCREENS */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; opacity: 0; transition: opacity 0.5s ease;
        }
        .active { display: flex; opacity: 1; }

        /* HUD & NAVIGATION */
        .btn-hilu {
            position: absolute; top: 50px; left: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--bone); color: var(--bone);
            padding: 12px 24px; font-size: 0.7rem; font-weight: 900;
            letter-spacing: 4px; z-index: 2000; border-radius: 40px;
        }

        /* HOME UI: ACTION PILLS */
        .pill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; max-width: 400px; }
        .pill {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--lead);
            padding: 30px 10px; border-radius: 20px; text-align: center;
        }
        .pill.is-pressed {
            transform: scale(0.97);
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.14);
            box-shadow: 0 0 14px rgba(56, 189, 248, 0.25);
        }
        .pill:active { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .pill-large { grid-column: span 2; }
        .halt-trigger {
            width: 140px; height: 140px; border-radius: 50%;
            border: 2px solid var(--danger); margin-bottom: 40px;
            display: flex; align-items: center; justify-content: center;
            color: var(--danger); font-weight: 900; letter-spacing: 5px;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .halt-trigger.is-pressed {
            transform: scale(0.95);
            background: rgba(239, 68, 68, 0.22);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.35);
        }

        /* SPARK: PRESSURE SYSTEM */
        #spark-in {
            width: 90%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: var(--bone);
            font-size: 2rem;
            text-align: center;
            outline: none;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        #spark-in:focus {
            border-color: var(--danger);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.25);
        }
        .feather-orb {
            width: 60px;
            height: 60px;
            position: absolute;
            pointer-events: auto;
            z-index: 1000;
            filter: drop-shadow(0 0 8px var(--accent));
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2338bdf8"><path d="M21 2c-5 0-11 5-13 11-1 3 0 6 0 6l-5 3 1 1 3-5s3 1 6 0c6-2 11-8 11-13 0-1-1-3-3-3z"/></svg>') no-repeat center;
            background-size: contain;
            transition: all 0.8s cubic-bezier(0.445, 0.05, 0.55, 0.95);
            cursor: pointer;
        }
        @keyframes shatter-out {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            30% { transform: scale(1.2) rotate(2deg); color: var(--danger); }
            100% { transform: scale(5); opacity: 0; filter: blur(40px) brightness(2); }
        }
        .shattering {
            animation: shatter-out 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
            pointer-events: none;
        }

        /* STILL: LOGIC AREA */
        #logic-instr { color: var(--accent); font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 20px; }
        #q-text { font-size: 3rem; font-weight: 900; margin-bottom: 20px; }
        #logic-in { background: transparent; border-bottom: 2px solid var(--bone); color: var(--bone); font-size: 2rem; width: 100px; text-align: center; outline: none; }

        canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; }
    </style>
</head>
<body>

    <div id="scr-home" class="screen active">
        <div class="halt-trigger" data-go="halt" role="button" tabindex="0" aria-label="Open HALT protocol">HALT</div>
        <div class="pill-grid">
            <div class="pill" data-go="still" role="button" tabindex="0" aria-label="Open STILL protocol"><div style="color:var(--accent)">STILL</div></div>
            <div class="pill" data-go="spark" role="button" tabindex="0" aria-label="Open SPARK protocol"><div style="color:var(--accent)">SPARK</div></div>
            <div class="pill pill-large" data-go="weave" role="button" tabindex="0" aria-label="Open WEAVE protocol"><div style="color:var(--accent)">WEAVE</div></div>
        </div>
    </div>

    <div id="scr-still" class="screen">
        <button class="btn-hilu" onclick="home()">HÍLU</button>
        <div id="logic-instr">PREPARE</div>
        <div id="q-text"></div>
        <input type="number" id="logic-in" oninput="checkStill()">
    </div>

    <div id="scr-spark" class="screen">
        <button class="btn-hilu" onclick="home()">HÍLU</button>
        <input type="text" id="spark-in" placeholder="TYPE BURDEN" onkeydown="handleSpark(event)">
        <p id="spark-hint" style="margin-top: 18px; font-size: 0.75rem; letter-spacing: 3px; opacity: 0.6;">ENTER TO SHATTER</p>
        <div id="orb-v" class="feather-orb" style="display:none;" onclick="hitOrbit()"></div>
    </div>

    <div id="scr-weave" class="screen">
        <button class="btn-hilu" onclick="home()">HÍLU</button>
        <canvas id="cvs"></canvas>
        <div id="touch-layer"></div>
    </div>

    <script>
        let currentMode = 'home';
        let orbitCount = 0;
        let orbitRadius = 140;
        let connectedPoints = [];
        let curLvl = 0;
        let drawing = false;

        const advancedLevels = [
            {
                n: "ST’ÉXEM MASK",
                pts: [
                    {x: 0.5, y: 0.5, h: true},  // 0: THE HUB (Center)
                    {x: 0.2, y: 0.3},           // 1: Top Left
                    {x: 0.5, y: 0.5, h: true},  // 2: Back to Hub
                    {x: 0.8, y: 0.3},           // 3: Top Right
                    {x: 0.5, y: 0.5, h: true},  // 4: Back to Hub
                    {x: 0.2, y: 0.7},           // 5: Bottom Left
                    {x: 0.5, y: 0.5, h: true},  // 6: Back to Hub
                    {x: 0.8, y: 0.7},           // 7: Bottom Right
                    {x: 0.5, y: 0.2, h: true},  // 8: Crown Point
                    {x: 0.5, y: 0.8}            // 9: Base Anchor
                ]
            }
        ];

        function go(s) {
            currentMode = s;
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            const targetScreen = document.getElementById(`scr-${s}`);
            if (!targetScreen) return;
            targetScreen.classList.add('active');
            if(s === 'weave') initWeave();
            if(s === 'still') nextStill();
            if(s === 'spark') resetSpark();
        }

        function bindHomeNavigation() {
            const navItems = document.querySelectorAll('#scr-home [data-go]');
            navItems.forEach((item) => {
                const target = item.getAttribute('data-go');
                if (!target) return;

                const setPressed = () => item.classList.add('is-pressed');
                const clearPressed = () => item.classList.remove('is-pressed');

                item.addEventListener('pointerdown', (event) => {
                    if (!event.isPrimary) return;
                    if (event.pointerType === 'mouse' && event.button !== 0) return;
                    setPressed();
                });

                item.addEventListener('pointerup', clearPressed);
                item.addEventListener('pointercancel', clearPressed);
                item.addEventListener('pointerleave', clearPressed);

                item.addEventListener('click', (event) => {
                    if (typeof event.button === 'number' && event.button !== 0) return;
                    clearPressed();
                    go(target);
                });

                item.addEventListener('keydown', (event) => {
                    if (event.key !== 'Enter' && event.key !== ' ') return;
                    event.preventDefault();
                    setPressed();
                    requestAnimationFrame(() => {
                        clearPressed();
                    });
                    go(target);
                });
            });
        }

        function home() { go('home'); }

        // SPARK LOGIC
        function handleSpark(e) {
            if (e.key !== 'Enter') return;
            e.preventDefault();

            const input = document.getElementById('spark-in');
            if (!input.value.trim() || input.classList.contains('shattering')) return;

            input.classList.add('shattering');
            if (navigator.vibrate) navigator.vibrate([30, 100, 50, 200]);

            setTimeout(() => {
                input.style.display = 'none';
                input.classList.remove('shattering');
                input.value = '';
                document.getElementById('spark-hint').style.display = 'none';
                startOrbitalEMDR();
            }, 800);
        }

        function resetSpark() {
            const input = document.getElementById('spark-in');
            const orb = document.getElementById('orb-v');
            const hint = document.getElementById('spark-hint');
            input.style.display = 'block';
            input.classList.remove('shattering');
            input.value = '';
            hint.style.display = 'block';
            orb.style.display = 'none';
            orbitCount = 0;
        }

        function startOrbitalEMDR() {
            const orb = document.getElementById('orb-v');
            orb.style.display = 'block';
            moveOrbit();
        }

        function moveOrbit() {
            const orb = document.getElementById('orb-v');
            const angle = (orbitCount * 45) * (Math.PI / 180);
            const dynamicRadius = orbitRadius + (Math.sin(orbitCount) * 20);
            const x = Math.cos(angle) * dynamicRadius + (window.innerWidth / 2) - 30;
            const y = Math.sin(angle) * dynamicRadius + (window.innerHeight / 2) - 30;

            orb.style.left = `${x}px`;
            orb.style.top = `${y}px`;

            const speed = Math.max(400, 1000 - (orbitCount * 50));
            orb.style.transition = `all ${speed}ms ease-in-out`;
        }

        function hitOrbit() {
            orbitCount++;
            if (navigator.vibrate) navigator.vibrate(25);

            if (orbitCount >= 16) {
                document.getElementById('orb-v').style.display = 'none';
                home();
            } else {
                moveOrbit();
            }
        }

        // STILL LOGIC
        let answer = "";
        function nextStill() {
            const instr = document.getElementById('logic-instr');
            const q = document.getElementById('q-text');
            const types = [
                {i: "COUNT DOTS", q: "● ● ● ● ●", a: "5"},
                {i: "SOLVE", q: "12 x 4", a: "48"}
            ];
            const t = types[Math.floor(Math.random()*types.length)];
            instr.innerText = t.i;
            q.innerText = t.q;
            answer = t.a;
        }

        function checkStill() {
            const val = document.getElementById('logic-in').value;
            if(val === answer) {
                if(navigator.vibrate) navigator.vibrate(30);
                nextStill();
                document.getElementById('logic-in').value = "";
            }
        }

        // WEAVE LOGIC (MAGNETIC HUB)
        function initWeave() {
            const c = document.getElementById('cvs');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            connectedPoints = [0];

            document.getElementById('touch-layer').onpointermove = (e) => {
                const pts = advancedLevels[curLvl].pts;
                const nextIdx = connectedPoints.length;
                if(nextIdx >= pts.length) return;

                const target = pts[nextIdx];
                const tx = target.x * c.width;
                const ty = target.y * c.height;
                const dist = Math.sqrt((e.clientX - tx)**2 + (e.clientY - ty)**2);

                if(dist < 60) {
                    connectedPoints.push(nextIdx);
                    if(navigator.vibrate) navigator.vibrate(40);
                }
            };
            requestAnimationFrame(drawLoop);
        }

        function drawLoop() {
            const c = document.getElementById('cvs');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth;
            c.height = window.innerHeight;

            ctx.fillStyle = '#0f172a'; // Midnight Slate
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            const pts = advancedLevels[curLvl].pts;

            // 1. THE ROADMAP (Bone White Dashed Path)
            // This now shows the "In-and-Out" complexity before they start
            ctx.setLineDash([6, 10]);
            ctx.strokeStyle = 'rgba(248, 250, 252, 0.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            pts.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x * window.innerWidth, p.y * window.innerHeight);
                else ctx.lineTo(p.x * window.innerWidth, p.y * window.innerHeight);
            });
            ctx.stroke();

            // 2. THE ACTIVE THREAD (Sky Blue)
            ctx.setLineDash([]);
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            connectedPoints.forEach((idx, i) => {
                const p = pts[idx];
                if (i === 0) ctx.moveTo(p.x * window.innerWidth, p.y * window.innerHeight);
                else ctx.lineTo(p.x * window.innerWidth, p.y * window.innerHeight);
            });
            ctx.stroke();

            // 3. THE NEXT TARGET (Teal Glow)
            const nextIdx = connectedPoints.length;
            if (nextIdx < pts.length) {
                const p = pts[nextIdx];
                const isHub = p.h === true;

                // Large Beacon for Hub, Standard for Spoke
                ctx.beginPath();
                ctx.arc(p.x * window.innerWidth, p.y * window.innerHeight, isHub ? 15 : 8, 0, 7);
                ctx.fillStyle = isHub ? '#38bdf8' : '#0d9488';
                ctx.shadowBlur = 20;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(drawLoop);
        }
        window.addEventListener('DOMContentLoaded', () => {
            const hasActive = document.querySelector('.screen.active');
            if (!hasActive) {
                const homeScreen = document.getElementById('scr-home');
                if (homeScreen) homeScreen.classList.add('active');
            }
            bindHomeNavigation();
        });
    </script>
</body>
</html>
