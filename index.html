<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | The Quiet</title>
    <style>
        :root {
            --bg: #020617; /* Pitch Black for focus */
            --jade: #00a36c;
            --teal: #2dd4bf;
            --text: #f1f5f9;
            --gold: #fbbf24;
            --red: #f43f5e;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevents accidental iPad swipes */
            -webkit-user-select: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .active { display: flex; opacity: 1; }

        /* UI ELEMENTS */
        .btn-hilu {
            position: absolute; top: 30px; left: 30px;
            background: rgba(0, 163, 108, 0.1);
            border: 1px solid var(--jade);
            color: var(--jade);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            z-index: 1000;
            cursor: pointer;
        }

        .phonetic { font-size: 0.6rem; opacity: 0.6; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        .instr-card {
            background: rgba(0, 163, 108, 0.05);
            border: 1px solid rgba(0, 163, 108, 0.3);
            padding: 20px;
            border-radius: 20px;
            max-width: 280px;
            text-align: center;
            margin-bottom: 20px;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #touch-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1 style="letter-spacing: 12px; color: var(--jade); font-weight: 900; margin-bottom: 0;">SXT’EKW</h1>
        <p class="phonetic">THE QUIET [ suh-t-ekw ]</p>

        <div style="margin-top: 50px; width: 80%; max-width: 400px;">
            <button class="menu-btn" onclick="startWeave()" style="background: var(--jade); color: var(--bg); border: none; width: 100%; padding: 20px; border-radius: 20px; font-weight: bold; margin-bottom: 15px;">
                KW’ÉTL’EN <span class="phonetic" style="display:block; color: var(--bg);">[ THE WEAVE ]</span>
            </button>
            <button class="menu-btn" onclick="startPaxwad()" style="background: none; border: 1px solid var(--gold); color: var(--gold); width: 100%; padding: 20px; border-radius: 20px; font-weight: bold;">
                P’ÁX̌WAD <span class="phonetic" style="display:block; color: var(--gold);">[ THE SPARK ]</span>
            </button>
        </div>
        <div style="position: absolute; bottom: 40px; font-size: 0.5rem; letter-spacing: 2px; opacity: 0.4;">FOR JADE</div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU [ DEPART ]</button>

        <div id="weave-header" style="z-index: 5; text-align: center; position: absolute; top: 100px; pointer-events: none;">
            <h2 id="animal-name" style="color: var(--jade); letter-spacing: 8px; margin: 0;"></h2>
            <p id="animal-phonetic" class="phonetic"></p>
        </div>

        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer" onmousedown="startLine(event)" onmousemove="drawLine(event)" onmouseup="endLine()" ontouchstart="startLine(event)" ontouchmove="drawLine(event)" ontouchend="endLine()"></div>
    </div>

    <div id="screen-paxwad" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU [ DEPART ]</button>

        <div id="paxwad-instr" class="instr-card">
            <span style="color: var(--gold); font-weight: 900;">STILLNESS RULE:</span><br>
            Keep your head still.<br>Follow the spark with eyes only.
        </div>
        <div id="spark-target" onclick="hitSpark()" style="position: absolute; width: 40px; height: 40px; background: var(--jade); border-radius: 50%; box-shadow: 0 0 20px var(--jade); cursor: pointer;"></div>
        <div id="spark-count" style="position: absolute; bottom: 50px; color: var(--jade); font-size: 0.8rem; letter-spacing: 4px;">SYNCS: 0/10</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        const saccadeCanvas = document.getElementById('saccade-canvas'); const sCtx = saccadeCanvas.getContext('2d');
        const weaveCanvas = document.getElementById('weave-canvas'); const wCtx = weaveCanvas.getContext('2d');
        let particles = [], weavePoints = [], weavePaths = [], mouse = { x: null, y: null }, audioCtx;
        let leftOsc, rightOsc, masterGain, vantageMode = false, shatterPoint = false, weavingActive = false;
        let featherX = 0, featherY = 0, featherAngle = 0, featherDir = 1;
        let solvedCount = 0, currentTaskAnswer = "";
        let saccadeTaps = 0, isSaccadicMode = false;
        let currentAudioMode = 'headphone';
        let protocolMode = false;
        let canProceed = false;
        let vantageShatterTimer = null;
        let currentTargetText = "THE NOISE";
        const rootStyles = getComputedStyle(document.documentElement);
        const tealColor = rootStyles.getPropertyValue('--teal').trim() || "#2dd4bf";
        const goldColor = rootStyles.getPropertyValue('--gold').trim() || "#fbbf24";
        const jadeColor = rootStyles.getPropertyValue('--jade').trim() || tealColor;

        // STAR-MAP DATA: WOLF CONSTELLATION (STIQÍYU’)
        const wolfLevel = {
            name: "STIQÍYU’",
            phonetic: "STEE-KEE-YOO",
            meaning: "THE WOLF",
            stars: [
                { x: 80, y: 20, size: 3 }, // Ear tip
                { x: 70, y: 30, size: 2 }, // Head top
                { x: 85, y: 40, size: 2 }, // Snout
                { x: 60, y: 45, size: 4 }, // Shoulder (Heart star)
                { x: 40, y: 40, size: 2 }, // Back
                { x: 20, y: 30, size: 3 }, // Tail tip
                { x: 55, y: 70, size: 2 }, // Front Paw
                { x: 35, y: 75, size: 2 }  // Back Paw
            ],
            // The "Protective" Weave
            paths: [[0, 1], [1, 2], [2, 3], [3, 4], [4, 5], [3, 6], [4, 7]]
        };

        const bioTips = [
            "OWL EYES: Soften your gaze. See the screen edges without moving your head.",
            "VAGAL HUM: Make a low 'Mmm' sound. Feel the vibration in your chest.",
            "PERIPHERAL: Don't stare at the spark. Watch it with your side-vision.",
            "VAGAL TONE: Take a long, slow exhale through pursed lips."
        ];
      
        const screens = ['screen-home', 'screen-weave', 'screen-paxwad'];

        function show(id) {
            screens.forEach((s) => document.getElementById(s).classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');
        }

        function exitToHome() {
            if (navigator.vibrate) navigator.vibrate(20);
            show('screen-home');
        }

        // --- WEAVING LOGIC (STARS) ---
        const constellationData = [
            { name: "SQUWAL'QUW", phon: "SK-WALL-KW", stars: [{ x: 0.5, y: 0.3 }, { x: 0.4, y: 0.5 }, { x: 0.6, y: 0.5 }, { x: 0.5, y: 0.7 }] },
            { name: "STIQÍYU’", phon: "STEE-KEE-YOO", stars: [{ x: 0.2, y: 0.4 }, { x: 0.4, y: 0.3 }, { x: 0.6, y: 0.3 }, { x: 0.8, y: 0.4 }, { x: 0.5, y: 0.6 }] }
        ];

        let currentLevel = 0;
        const canvas = document.getElementById('weave-canvas');
        const ctx = canvas.getContext('2d');
        const jadeColor = getComputedStyle(document.documentElement).getPropertyValue('--jade').trim() || '#00a36c';
        let drawing = false;
        let lastPoint = null;

        function startWeave() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateAnimalText();
            show('screen-weave');
            requestAnimationFrame(animateStars);
        }

        function updateAnimalText() {
            const data = constellationData[currentLevel];
            document.getElementById('animal-name').innerText = data.name;
            document.getElementById('animal-phonetic').innerText = data.phon;
        }

        function animateStars() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle Twinkle Logic
            const time = Date.now() * 0.002;
            const data = constellationData[currentLevel];

            data.stars.forEach((s) => {
                const x = s.x * canvas.width;
                const y = s.y * canvas.height;
                const twinkle = Math.sin(time + x) * 0.3 + 0.7;

                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 163, 108, ${twinkle})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = jadeColor;
                ctx.fill();
            });

            if (document.getElementById('screen-weave').classList.contains('active')) {
                requestAnimationFrame(animateStars);
            }
        }

        function getEventPoint(event) {
            const touch = event.touches && event.touches[0];
            if (touch) return { x: touch.clientX, y: touch.clientY };
            return { x: event.clientX, y: event.clientY };
        }

        function startLine(event) {
            if (event.cancelable) event.preventDefault();
            drawing = true;
            lastPoint = getEventPoint(event);
        }

        function drawLine(event) {
            if (!drawing) return;
            if (event.cancelable) event.preventDefault();
            const nextPoint = getEventPoint(event);
            if (!lastPoint || !nextPoint) return;
            ctx.beginPath();
            ctx.moveTo(lastPoint.x, lastPoint.y);
            ctx.lineTo(nextPoint.x, nextPoint.y);
            ctx.strokeStyle = `rgba(251, 191, 36, 0.85)`;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fbbf24';
            ctx.stroke();
            lastPoint = nextPoint;
        }

        function endLine() {
            drawing = false;
            lastPoint = null;
        }

        // --- SPARK LOGIC (PAXWAD) ---
        let count = 0;
        function startPaxwad() {
            count = 0;
            updateSparkCount();
            moveSpark();
            show('screen-paxwad');
            document.getElementById('paxwad-instr').style.opacity = 1;
        }

        function hitSpark() {
            count++;
            updateSparkCount();
            if (navigator.vibrate) navigator.vibrate(30);
            if (count >= 3) document.getElementById('paxwad-instr').style.opacity = 0;

            if (count >= 10) {
                exitToHome();
            } else {
                moveSpark();
            }
        }

        // --- WEAVER ---
        function startWeave() {
            closeElder();
            weavingActive = true; show('weave');
            const instr = document.getElementById('weave-instructions');
            instr.style.opacity = "1"; setTimeout(() => instr.style.opacity = "0", 3500);
            const titleEl = instr ? instr.querySelector('h2') : null;
            const bodyEl = instr ? instr.querySelector('p') : null;
            if (titleEl) titleEl.innerText = `${wolfLevel.name} (${wolfLevel.phonetic})`;
            if (bodyEl) bodyEl.innerHTML = `${wolfLevel.meaning}<br><small style="font-weight: normal; opacity: 0.7;">Drag thumb to connect the protective weave.</small>`;
            weaveCanvas.width = window.innerWidth; weaveCanvas.height = window.innerHeight;
            weavePoints = wolfLevel.stars.map((star, idx) => ({
                x: (weaveCanvas.width * star.x) / 100,
                y: (weaveCanvas.height * star.y) / 100,
                baseX: (weaveCanvas.width * star.x) / 100,
                baseY: (weaveCanvas.height * star.y) / 100,
                size: star.size,
                driftSeed: idx * 0.75,
                locked: false
            }));
            weavePaths = [...wolfLevel.paths];
            animateWeave();
        }

        function animateWeave() {
            if (!weavingActive) return;
            
            // Create a "Trailing" effect by not clearing the canvas fully
            wCtx.fillStyle = 'rgba(2, 6, 23, 0.15)';
            wCtx.fillRect(0, 0, weaveCanvas.width, weaveCanvas.height);
            
            let locked = 0;
            let wovenSegments = 0;
            const time = Date.now() * 0.002; // Used for the "Pulse"

            weavePaths.forEach(path => {
                const from = weavePoints[path[0]];
                const to = weavePoints[path[1]];
                if (!from || !to) return;
                const isWoven = from.locked && to.locked;
                if (isWoven) wovenSegments++;
                wCtx.strokeStyle = isWoven ? `rgba(251, 191, 36, ${0.35 + Math.sin(time) * 0.1})` : 'rgba(45, 212, 191, 0.15)';
                wCtx.lineWidth = isWoven ? 2.2 : 1.2;
                wCtx.beginPath();
                wCtx.moveTo(from.x, from.y);
                wCtx.lineTo(to.x, to.y);
                wCtx.stroke();
            });

            weavePoints.forEach(p => {
                // Floating movement (The "Current")
                if (!p.locked) {
                    p.x = p.baseX + Math.sin(time + p.driftSeed) * 3;
                    p.y = p.baseY + Math.cos(time + p.driftSeed) * 3;
                }

                let d = Math.sqrt((mouse.x - p.x)**2 + (mouse.y - p.y)**2);
                if (d < 55 && !p.locked) {
                    p.locked = true;
                    if (navigator.vibrate) navigator.vibrate(10);
                }
                
                if (p.locked) {
                    locked++;
                    // Glowing Core
                    wCtx.shadowBlur = 15;
                    wCtx.shadowColor = goldColor;
                    wCtx.fillStyle = goldColor;
                    wCtx.beginPath(); wCtx.arc(p.x, p.y, 2 + p.size, 0, Math.PI*2); wCtx.fill();
                    wCtx.shadowBlur = 0;
                } else {
                    // Subtle "Breathing" for uncollected dots
                    wCtx.fillStyle = `rgba(45, 212, 191, ${0.1 + Math.sin(time) * 0.05})`;
                    wCtx.beginPath(); wCtx.arc(p.x, p.y, 1 + (p.size * 0.6), 0, Math.PI*2); wCtx.fill();
                }
            });

            const starCompletion = weavePoints.length ? (locked / weavePoints.length) : 0;
            const pathCompletion = weavePaths.length ? (wovenSegments / weavePaths.length) : 0;
            let percent = Math.round(((starCompletion + pathCompletion) / 2) * 100);
            document.getElementById('weave-progress').innerText = `${percent}% WOVEN`;
            
            if (percent >= 100) {
                document.getElementById('weave-progress').innerText = "NEURAL SYNC COMPLETE";
                // Flash effect
                wCtx.fillStyle = "rgba(255, 255, 255, 0.05)";
                wCtx.fillRect(0, 0, weaveCanvas.width, weaveCanvas.height);
            }
            
            requestAnimationFrame(animateWeave);
        function moveSpark() {
            const target = document.getElementById('spark-target');
            const x = Math.random() * (window.innerWidth - 100) + 50;
            const y = Math.random() * (window.innerHeight - 100) + 50;
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        function updateSparkCount() {
            document.getElementById('spark-count').innerText = `SYNCS: ${count}/10`;
        }

        // Resize handler for iPad rotation
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
