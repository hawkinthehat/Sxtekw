<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | Warrior Master</title>
    <style>
        /* COLOR PALETTE: BLACK (000), RED (f43f5e), YELLOW (fbbf24) */
        :root { --bg: #000; --red: #f43f5e; --gold: #fbbf24; --text: #f1f5f9; --off: #222; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; opacity: 0; transition: opacity 0.6s ease; }
        .active { display: flex; opacity: 1; }

        /* CENTERED LOGO (128 BPM Pulse) */
        @keyframes beat {
            0% { transform: scale(1); filter: brightness(1); }
            15% { transform: scale(1.1); filter: brightness(1.6); box-shadow: 0 0 50px var(--gold); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .logo-beat { width: 120px; height: 120px; border: 3px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: beat 0.468s infinite; margin-bottom: 30px; }
        .logo-text { color: var(--gold); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; }

        /* BUTTONS */
        .launch-btn { width: 280px; padding: 18px; margin: 8px 0; border: 1px solid var(--off); background: #050505; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .launch-btn:active { background: #111; border-color: var(--red); }
        .btn-title { font-size: 0.9rem; letter-spacing: 5px; font-weight: 900; color: var(--gold); }
        .phonetic { font-size: 0.5rem; letter-spacing: 3px; color: var(--text); opacity: 0.5; margin-top: 4px; text-transform: uppercase; }

        /* NEURAL HIJACK */
        #logic-q { font-size: 1.6rem; color: var(--gold); margin-bottom: 20px; min-height: 1.5em; text-align: center; }
        #logic-input { background: none; border-bottom: 2px solid var(--gold); border-top: none; border-left: none; border-right: none; color: white; width: 100%; text-align: center; font-size: 2rem; outline: none; text-transform: uppercase; }
        #prog-dots { font-size: 1.5rem; letter-spacing: 15px; color: var(--red); margin-top: 30px; opacity: 0.2; }
        #refocus-msg { font-size: 0.6rem; letter-spacing: 2px; color: var(--red); opacity: 0; margin-top: 16px; transition: opacity 0.3s ease; }

        /* EMDR FEATHER */
        #feather {
            position: absolute;
            width: 90px;
            height: 6px;
            background: var(--red);
            box-shadow: 0 0 20px var(--red), 0 0 40px var(--red);
            border-radius: 20px;
            transition: all 1.2s cubic-bezier(0.65, 0, 0.35, 1);
            display: none;
        }

        .btn-hilu { position: absolute; top: 30px; left: 30px; background: none; border: 1px solid var(--off); color: #444; padding: 8px 15px; font-size: 0.55rem; letter-spacing: 2px; z-index: 1000; text-transform: uppercase; cursor: pointer; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="logo-beat"><span class="logo-text">SXT’EKW</span></div>
        <div class="phonetic" style="margin-bottom: 40px; color: var(--gold); opacity: 0.8;">[ suh-t-ekw ] THE QUIET</div>

        <div class="launch-btn" onclick="startSection('paxwad')">
            <span class="btn-title">P’ÁX̌WAD</span>
            <span class="phonetic">[ pah-hwah-d ] SPARK</span>
        </div>
        <div class="launch-btn" onclick="startSection('weave')">
            <span class="btn-title">KW’ÉTL’EN</span>
            <span class="phonetic">[ kw-et-lun ] WEAVE</span>
        </div>
        <div class="launch-btn" onclick="startSection('kwelap')">
            <span class="btn-title">KW’ÉLAP</span>
            <span class="phonetic">[ kw-ay-lap ] HALT</span>
        </div>
    </div>

    <div id="screen-paxwad" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>

        <div id="hijack-layer" style="text-align: center; width: 80%;">
            <p style="font-size: 0.5rem; color: var(--gold); letter-spacing: 5px;">ST’ÉXEM [ STILL ]</p>
            <div id="logic-q"></div>
            <input type="text" id="logic-input" autocomplete="off" oninput="checkLogic()">
            <div id="prog-dots">● ● ●</div>
            <div id="refocus-msg">REFOCUS</div>
        </div>

        <div id="feather" onclick="hitFeather()"></div>
        <div id="spark-count" style="position: absolute; bottom: 50px; color: #111; letter-spacing: 8px; font-size: 0.7rem;">0 / 10</div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="z-index: 100; text-align: center; position: absolute; top: 100px; pointer-events: none;">
            <h2 id="animal-name" style="color: var(--gold); letter-spacing: 6px; margin: 0;"></h2>
            <div id="animal-phonetic" class="phonetic" style="color: var(--gold); opacity: 0.8;"></div>
        </div>
        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer"></div>
    </div>

    <div id="screen-kwelap" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="text-align: center; width: 100%; z-index: 20;">
            <p class="phonetic" style="margin-bottom: 20px;">NAME THE THOUGHT</p>
            <textarea id="halt-thought" placeholder="..." onkeypress="handleHalt(event)" style="background: none; border: 1px solid #111; color: white; width: 80%; height: 100px; padding: 15px; text-align: center;"></textarea>
            <p style="font-size: 0.5rem; color: var(--red); opacity: 0.3; letter-spacing: 2px; margin-top: 20px;">ENTER TO UNWEAVE</p>
        </div>
    </div>

    <script>
        const totems = [
            { name: "SQUWAL'QUW", phonetic: "[ sk-wahl-koo ] RAVEN", points: [{x: 0.5, y: 0.2}, {x: 0.3, y: 0.5}, {x: 0.7, y: 0.5}, {x: 0.5, y: 0.8}, {x: 0.5, y: 0.2}] },
            { name: "STIQÍYU’", phonetic: "[ stee-kee-yoo ] WOLF", points: [{x: 0.1, y: 0.4}, {x: 0.5, y: 0.3}, {x: 0.9, y: 0.4}, {x: 0.5, y: 0.8}, {x: 0.1, y: 0.4}] }
        ];

        let currentLevel = 0;
        let isDrawing = false;
        let userPath = [];
        let correctCount = 0;
        let currentAns = "";
        let sparkCount = 0;
        let fSide = 0;

        function startSection(type) {
            const targetScreen = document.getElementById(`screen-${type}`);
            if (!targetScreen) return;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            targetScreen.classList.add('active');
            if (type === 'paxwad') initHijack();
            if (type === 'weave') initWeave();
        }

        function exitToHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-home').classList.add('active');
            document.getElementById('feather').style.display = 'none';
            isDrawing = false;
            userPath = [];
        }

        /* --- ST’ÉXEM / PAXWAD --- */
        const logicTasks = [
            { q: () => { const a = Math.floor(Math.random() * 9) + 2; const b = Math.floor(Math.random() * 8) + 3; return { txt: `${a} x ${b}`, ans: (a * b).toString() }; } },
            { q: () => { const words = ["RAVEN", "WOLF", "ELK", "CEDAR", "SALMON"]; const w = words[Math.floor(Math.random() * words.length)]; return { txt: `REVERSE: ${w}`, ans: w.split('').reverse().join('') }; } },
            { q: () => { const n = Math.floor(Math.random() * 6) + 4; return { txt: "● ".repeat(n), ans: n.toString() }; } }
        ];

        function initHijack() {
            correctCount = 0;
            document.getElementById('hijack-layer').style.display = 'block';
            document.getElementById('logic-input').style.display = 'block';
            document.getElementById('refocus-msg').style.opacity = 0;
            document.getElementById('feather').style.display = 'none';
            document.getElementById('prog-dots').style.opacity = 0.2;
            nextTask();
        }

        function nextTask() {
            const t = logicTasks[Math.floor(Math.random() * logicTasks.length)].q();
            document.getElementById('logic-q').innerText = t.txt;
            currentAns = t.ans;
            document.getElementById('logic-input').value = "";
            document.getElementById('logic-input').focus();
        }

        function checkLogic() {
            const val = document.getElementById('logic-input').value.toUpperCase();
            if (val === currentAns) {
                correctCount++;
                if (navigator.vibrate) navigator.vibrate(40);

                if (correctCount >= 3) {
                    document.getElementById('logic-q').innerText = "STABILIZED";
                    document.getElementById('logic-input').style.display = "none";
                    setTimeout(startFeather, 800);
                } else {
                    document.getElementById('prog-dots').style.opacity = (correctCount / 3);
                    setTimeout(nextTask, 250);
                }
            } else if (val.length >= currentAns.length && val !== currentAns) {
                correctCount = 0;
                document.getElementById('prog-dots').style.opacity = 0.2;
                const msg = document.getElementById('refocus-msg');
                msg.style.opacity = 1;
                if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
                setTimeout(() => { msg.style.opacity = 0; nextTask(); }, 1200);
            }
        }

        function startFeather() {
            document.getElementById('hijack-layer').style.display = 'none';
            const f = document.getElementById('feather');
            f.style.display = 'block';
            sparkCount = 0;
            document.getElementById('spark-count').innerText = "0 / 10";
            moveFeather();
        }

        function moveFeather() {
            const f = document.getElementById('feather');
            fSide = fSide === 0 ? 1 : 0;
            f.style.left = fSide === 0 ? '10%' : '80%';
            f.style.top = (Math.random() * 40 + 30) + '%';
        }

        function hitFeather() {
            sparkCount++;
            document.getElementById('spark-count').innerText = `${sparkCount} / 10`;
            if (navigator.vibrate) navigator.vibrate(20);
            if (sparkCount >= 10) {
                exitToHome();
            } else {
                moveFeather();
            }
        }

        /* --- WEAVE --- */
        function initWeave() {
            const canvas = document.getElementById('weave-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.getElementById('animal-name').innerText = totems[currentLevel].name;
            document.getElementById('animal-phonetic').innerText = totems[currentLevel].phonetic;
            const layer = document.getElementById('touch-layer');
            layer.onpointerdown = (e) => { isDrawing = true; userPath = [{ x: e.clientX, y: e.clientY }]; };
            layer.onpointermove = (e) => { if (isDrawing) userPath.push({ x: e.clientX, y: e.clientY }); };
            layer.onpointerup = () => { isDrawing = false; };
            layer.onpointercancel = () => { isDrawing = false; };
            renderWeave();
        }

        function renderWeave() {
            const canvas = document.getElementById('weave-canvas');
            if (!canvas || !document.getElementById('screen-weave').classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.setLineDash([]);
            const totem = totems[currentLevel];
            totem.points.forEach(p => {
                const twinkle = Math.sin(Date.now() * 0.003 + p.x) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(p.x * canvas.width, p.y * canvas.height, 5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(251, 191, 36, ${twinkle})`;
                ctx.fill();
            });

            if (isDrawing && userPath.length > 1) {
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 4;
                ctx.beginPath();
                userPath.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
            requestAnimationFrame(renderWeave);
        }

        /* --- HALT --- */
        function handleHalt(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const box = document.getElementById('halt-thought');

                box.style.transition = 'all 2.5s cubic-bezier(0.1, 0.5, 0.5, 1)';
                box.style.filter = 'blur(15px)';
                box.style.opacity = '0';
                box.style.transform = 'translateY(-100px) scale(1.2) rotate(5deg)';
                box.style.color = 'var(--gold)';

                if (navigator.vibrate) navigator.vibrate([5, 30, 5, 50, 5, 80]);

                setTimeout(() => {
                    box.value = "";
                    box.style.filter = 'none';
                    box.style.opacity = '1';
                    box.style.transform = 'none';
                    box.style.transition = 'none';
                    box.style.color = 'white';
                    exitToHome();
                }, 2600);
            }
        }
    </script>
</body>
</html>
