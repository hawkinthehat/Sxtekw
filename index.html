<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | The Quiet</title>
    <style>
        :root { --bg: #020617; --jade: #00A36C; --gold: #fbbf24; --text: #f1f5f9; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.8s ease; z-index: 10; }
        .active { display: flex; opacity: 1; }

        .btn-hilu { position: absolute; top: 30px; left: 30px; background: rgba(0, 163, 108, 0.1); border: 1px solid var(--jade); color: var(--jade); padding: 10px 20px; border-radius: 50px; font-size: 0.7rem; letter-spacing: 2px; z-index: 1000; cursor: pointer; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 500px; margin-top: 40px; }
        .menu-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 163, 108, 0.3); color: var(--text); padding: 25px 10px; border-radius: 20px; font-weight: bold; cursor: pointer; text-align: center; }
        .menu-btn:hover { border-color: var(--jade); background: rgba(0, 163, 108, 0.05); }

        .instr-card { background: rgba(0, 163, 108, 0.05); border: 2px solid var(--jade); padding: 20px; border-radius: 20px; max-width: 280px; text-align: center; z-index: 20; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #spark-target { position: absolute; width: 50px; height: 50px; background: var(--jade); border-radius: 50%; box-shadow: 0 0 30px var(--jade); cursor: pointer; z-index: 30; display: none; }
        
        input, textarea { background: none; border: 1px solid #333; color: white; border-radius: 10px; padding: 10px; outline: none; }
        input:focus, textarea:focus { border-color: var(--jade); }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1 style="letter-spacing: 12px; color: var(--jade); font-weight: 900;">SXT’EKW</h1>
        <div class="menu-grid">
            <div class="menu-btn" onclick="startSection('weave')">KW’ÉTL’EN<br><small style="opacity:0.5; letter-spacing:2px;">WEAVE</small></div>
            <div class="menu-btn" onclick="startSection('paxwad')">P’ÁX̌WAD<br><small style="opacity:0.5; letter-spacing:2px;">SPARK</small></div>
            <div class="menu-btn" onclick="startSection('stexem')">ST’ÉXEM<br><small style="opacity:0.5; letter-spacing:2px;">STILL</small></div>
            <div class="menu-btn" onclick="startSection('kwelap')">KW’ÉLAP<br><small style="opacity:0.5; letter-spacing:2px;">HALT</small></div>
        </div>
        <div style="position: absolute; bottom: 30px; font-size: 0.5rem; opacity: 0.3; letter-spacing: 2px;">JADE EDITION</div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="z-index: 100; text-align: center; position: absolute; top: 100px; pointer-events: none;">
            <h2 id="animal-name" style="color: var(--jade); letter-spacing: 8px;"></h2>
        </div>
        <canvas id="weave-canvas"></canvas>
    </div>

    <div id="screen-paxwad" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div id="paxwad-instr" class="instr-card">
            <span style="color: var(--gold); font-weight: 900;">STILLNESS RULE:</span><br>
            Keep head still. Follow with eyes only.
        </div>
        <div id="spark-target" onclick="hitSpark()"></div>
        <div id="spark-count" style="position: absolute; bottom: 50px; color: var(--jade); letter-spacing: 4px;">0 / 10</div>
    </div>

    <div id="screen-stexem" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div class="instr-card" style="border-color: var(--gold);">
            <p id="logic-question" style="font-size: 1.8rem; color: var(--gold); margin: 0;"></p>
            <input type="number" id="logic-answer" pattern="[0-9]*" inputmode="numeric" style="width: 80px; margin-top: 15px; text-align: center; font-size: 1.5rem;">
            <button onclick="checkLogic()" style="display: block; margin: 20px auto 0; background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold;">SUBMIT</button>
        </div>
    </div>

    <div id="screen-kwelap" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div class="instr-card" style="border-color: var(--text); width: 80%;">
            <p style="opacity: 0.7; font-size: 0.8rem;">NAME THE THOUGHT</p>
            <textarea id="halt-thought" placeholder="..." style="width: 100%; height: 100px;"></textarea>
            <p style="font-size: 0.6rem; opacity: 0.4; margin-top: 10px;">Watch it dissolve.</p>
        </div>
    </div>

    <script>
        const constellations = [
            { name: "SQUWAL'QUW", stars: [{x:0.5, y:0.2}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.8}] },
            { name: "STIQÍYU’", stars: [{x:0.2, y:0.5}, {x:0.4, y:0.3}, {x:0.6, y:0.3}, {x:0.8, y:0.5}, {x:0.5, y:0.7}] },
            { name: "QW’ULH-LÚ-MUCW", stars: [{x:0.3, y:0.6}, {x:0.5, y:0.2}, {x:0.7, y:0.6}, {x:0.5, y:0.8}] },
            { name: "YÍXWULA", stars: [{x:0.5, y:0.4}, {x:0.1, y:0.2}, {x:0.9, y:0.2}, {x:0.5, y:0.8}] }
        ];

        let currentLevel = 0;
        let sparkCount = 0;

        function startSection(type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${type}`).classList.add('active');
            if(type === 'weave') initWeave();
            if(type === 'paxwad') initSpark();
            if(type === 'stexem') initLogic();
        }

        function exitToHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-home').classList.add('active');
            document.getElementById('spark-target').style.display = 'none';
        }

        function initWeave() {
            const canvas = document.getElementById('weave-canvas');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            document.getElementById('animal-name').innerText = constellations[currentLevel].name;
            renderStars();
        }

        function renderStars() {
            const ctx = document.getElementById('weave-canvas').getContext('2d');
            ctx.fillStyle = '#020617';
            ctx.fillRect(0,0,innerWidth,innerHeight);
            const data = constellations[currentLevel];
            data.stars.forEach(s => {
                const twinkle = Math.sin(Date.now() * 0.002 + s.x * 1000) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(s.x * innerWidth, s.y * innerHeight, 6, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 163, 108, ${twinkle})`;
                ctx.shadowBlur = 15; ctx.shadowColor = "var(--jade)";
                ctx.fill();
            });
            if (document.getElementById('screen-weave').classList.contains('active')) requestAnimationFrame(renderStars);
        }

        function initSpark() {
            sparkCount = 0;
            document.getElementById('spark-count').innerText = "0 / 10";
            document.getElementById('paxwad-instr').style.opacity = 1;
            document.getElementById('spark-target').style.display = 'block';
            moveSpark();
        }

        function hitSpark() {
            sparkCount++;
            document.getElementById('spark-count').innerText = `${sparkCount} / 10`;
            if (navigator.vibrate) navigator.vibrate(20);
            if (sparkCount >= 3) document.getElementById('paxwad-instr').style.opacity = 0;
            if (sparkCount >= 10) exitToHome(); else moveSpark();
        }

        function moveSpark() {
            const t = document.getElementById('spark-target');
            t.style.left = (Math.random() * (innerWidth-100)+50) + 'px';
            t.style.top = (Math.random() * (innerHeight-100)+50) + 'px';
        }

        function initLogic() {
            const a = Math.floor(Math.random() * 12) + 1;
            const b = Math.floor(Math.random() * 12) + 1;
            document.getElementById('logic-question').innerText = `${a} x ${b}`;
            window.correctResult = a * b;
            document.getElementById('logic-answer').value = "";
            document.getElementById('logic-answer').focus();
        }

        function checkLogic() {
            const ans = parseInt(document.getElementById('logic-answer').value);
            if(ans === window.correctResult) {
                if (navigator.vibrate) navigator.vibrate(30);
                initLogic();
            }
        }
    </script>
</body>
</html>
