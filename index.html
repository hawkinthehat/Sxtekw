<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | The Quiet</title>
    <style>
        :root { --bg: #020617; --jade: #00A36C; --gold: #fbbf24; --text: #f1f5f9; --red: #f43f5e; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.8s ease; }
        .active { display: flex; opacity: 1; }
        .btn-hilu { position: absolute; top: 30px; left: 30px; background: rgba(0, 163, 108, 0.1); border: 1px solid var(--jade); color: var(--jade); padding: 10px 20px; border-radius: 50px; font-size: 0.7rem; letter-spacing: 2px; z-index: 1000; cursor: pointer; }
        .phonetic { font-size: 0.6rem; opacity: 0.6; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
        .menu-btn { background: var(--jade); color: var(--bg); border: none; width: 280px; padding: 20px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .instr-card { background: rgba(0, 163, 108, 0.05); border: 2px solid var(--jade); padding: 20px; border-radius: 20px; max-width: 280px; text-align: center; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1 style="letter-spacing: 12px; color: var(--jade); font-weight: 900;">SXT’EKW</h1>
        <p class="phonetic">THE QUIET [ suh-t-ekw ]</p>
        <div style="margin-top: 40px;">
            <button class="menu-btn" onclick="startWeave()">KW’ÉTL’EN <span class="phonetic" style="display:block; color:var(--bg)">[ THE WEAVE ]</span></button>
            <button class="menu-btn" onclick="startPaxwad()" style="background:none; border:1px solid var(--gold); color:var(--gold)">P’ÁX̌WAD <span class="phonetic" style="display:block; color:var(--gold)">[ THE SPARK ]</span></button>
        </div>
        <div style="position: absolute; bottom: 30px; font-size: 0.5rem; opacity: 0.4;">FOR JADE</div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU [ DEPART ]</button>
        <div style="z-index: 5; text-align: center; position: absolute; top: 100px;">
            <h2 id="animal-name" style="color: var(--jade); letter-spacing: 8px;"></h2>
            <p id="animal-phonetic" class="phonetic"></p>
        </div>
        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer"></div>
    </div>

    <div id="screen-paxwad" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU [ DEPART ]</button>
        <div id="paxwad-instr" class="instr-card">
            <span style="color: var(--gold); font-weight: 900;">STILLNESS RULE:</span><br>
            Keep head still. Follow with eyes only.
        </div>
        <div id="spark-target" onclick="hitSpark()" style="position: absolute; width: 40px; height: 40px; background: var(--jade); border-radius: 50%; box-shadow: 0 0 20px var(--jade); display: none;"></div>
        <div id="spark-count" style="position: absolute; bottom: 50px; color: var(--jade); letter-spacing: 4px;">SYNCS: 0/10</div>
    </div>

    <script>
        const constellationData = [
            { name: "SQUWAL'QUW", phon: "SK-WALL-KW [RAVEN]", stars: [{x:0.5, y:0.25}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.75}] },
            { name: "STIQÍYU’", phon: "STEE-KEE-YOO [WOLF]", stars: [{x:0.2, y:0.5}, {x:0.4, y:0.3}, {x:0.6, y:0.3}, {x:0.8, y:0.5}, {x:0.5, y:0.7}] },
            { name: "QW’ULH-LÚ-MUCW", phon: "KW-UHL-LOO-MUKW [ORCA]", stars: [{x:0.3, y:0.6}, {x:0.5, y:0.2}, {x:0.7, y:0.6}, {x:0.5, y:0.8}] },
            { name: "YÍXWULA", phon: "YEE-KH-WUH-LAH [EAGLE]", stars: [{x:0.5, y:0.4}, {x:0.1, y:0.2}, {x:0.9, y:0.2}, {x:0.5, y:0.8}] }
        ];

        let currentLevel = 0;
        let count = 0;

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function exitToHome() { show('screen-home'); }

        function startWeave() {
            const canvas = document.getElementById('weave-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateAnimalText();
            show('screen-weave');
            animateStars();
        }

        function updateAnimalText() {
            const data = constellationData[currentLevel];
            document.getElementById('animal-name').innerText = data.name;
            document.getElementById('animal-phonetic').innerText = data.phon;
        }

        function animateStars() {
            const ctx = document.getElementById('weave-canvas').getContext('2d');
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, innerWidth, innerHeight);
            const data = constellationData[currentLevel];
            data.stars.forEach(s => {
                const twinkle = Math.sin(Date.now() * 0.002 + s.x * 1000) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(s.x * innerWidth, s.y * innerHeight, 5, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 163, 108, ${twinkle})`;
                ctx.fill();
            });
            if (document.getElementById('screen-weave').classList.contains('active')) requestAnimationFrame(animateStars);
        }

        function startPaxwad() {
            count = 0;
            updateSparkCount();
            document.getElementById('spark-target').style.display = 'block';
            document.getElementById('paxwad-instr').style.opacity = 1;
            moveSpark();
            show('screen-paxwad');
        }

        function hitSpark() {
            count++;
            updateSparkCount();
            if (count >= 3) document.getElementById('paxwad-instr').style.opacity = 0;
            if (count >= 10) exitToHome(); else moveSpark();
        }

        function moveSpark() {
            const t = document.getElementById('spark-target');
            t.style.left = (Math.random() * (innerWidth-100)+50) + 'px';
            t.style.top = (Math.random() * (innerHeight-100)+50) + 'px';
        }

        function updateSparkCount() { document.getElementById('spark-count').innerText = `SYNCS: ${count}/10`; }
    </script>
</body>
</html>
