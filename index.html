<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | 2.0</title>
    <style>
        :root { --bg: #000; --teal: #0d9488; --gold: #fbbf24; --red: #f43f5e; --text: #f1f5f9; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; opacity: 0; transition: opacity 0.3s; }
        .active { display: flex; opacity: 1; }

        /* THE HEARTBEAT LOGO */
        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            10% { transform: scale(1.1); filter: brightness(1.6); box-shadow: 0 0 30px var(--teal); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .logo-pulse { width: 85px; height: 85px; border: 2px solid var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 0.468s infinite; margin-bottom: 20px; }

        /* BUTTONS */
        .btn-2 { width: 260px; padding: 18px; margin: 8px 0; border: 1px solid #111; background: #050505; text-align: center; cursor: pointer; }
        .btn-2:active { background: #111; border-color: var(--teal); }
        .t-main { font-size: 1rem; letter-spacing: 5px; font-weight: 900; color: var(--teal); display: block; }
        .t-phonetic { font-size: 0.65rem; letter-spacing: 2px; color: var(--gold); margin-top: 4px; display: block; }

        /* LOGIC & FEATHERS */
        #q-text { font-size: 1.8rem; color: var(--gold); margin-bottom: 15px; text-align: center; font-weight: bold; }
        #logic-in { background: none; border-bottom: 2px solid var(--gold); border-top:none; border-left:none; border-right:none; color: #fff; width: 70%; text-align: center; font-size: 2.2rem; outline: none; }
        
        .feather-h { position: absolute; width: 90px; height: 10px; background: var(--teal); border-radius: 20px; box-shadow: 0 0 20px var(--teal); display: none; transition: all 1.1s cubic-bezier(0.65, 0, 0.35, 1); }
        .feather-v {
            width: 60px;
            height: 60px;
            border: 3px solid var(--teal);
            border-radius: 50%;
            box-shadow: 0 0 40px var(--teal), inset 0 0 20px var(--teal);
            display: none;
            position: absolute;
            z-index: 100;
            transition: all 0.8s cubic-bezier(0.445, 0.05, 0.55, 0.95);
        }

        @keyframes shatter-out {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            30% { transform: scale(1.2) rotate(2deg); color: var(--red); }
            100% { transform: scale(5); opacity: 0; filter: blur(40px) brightness(2); }
        }
        .shattering {
            animation: shatter-out 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
            pointer-events: none;
        }

        #spark-in {
            width: 100%;
            height: 100px;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            resize: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            border-radius: 12px;
            transition: border 0.4s ease;
        }
        #spark-in:focus {
            border-color: var(--red);
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
        }

        .btn-back { position: absolute; top: 30px; left: 30px; background: none; border: 1px solid #222; color: #444; padding: 8px 14px; font-size: 0.5rem; letter-spacing: 2px; z-index: 1000; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        #touch-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        /* HALT MAXIMIZATION OVERRIDES */
        #scr-halt {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            overflow: hidden;
        }
        .halt-core {
            width: 200px;
            height: 200px;
            border: 2px solid var(--red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: halt-expand 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }
        @keyframes halt-expand {
            0% { transform: scale(0.8); opacity: 0.3; box-shadow: 0 0 0 var(--red); }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 50px var(--red); }
            100% { transform: scale(0.8); opacity: 0.3; box-shadow: 0 0 0 var(--red); }
        }
        .halt-label {
            color: var(--red);
            font-weight: 900;
            letter-spacing: 15px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(244, 63, 94, 0.5);
            z-index: 20;
            margin-left: 15px;
        }
        .gaze-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--red);
            border-radius: 50%;
            opacity: 0.8;
        }
        #halt-strobe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--red);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="scr-home" class="screen active">
        <div class="logo-pulse"><span style="color: var(--gold); font-weight: 900; font-size: 0.75rem;">SXT’EKW</span></div>
        <div class="t-phonetic" style="margin-bottom: 30px; opacity: 0.7;">[ suh-t-ekw ]</div>

        <div class="btn-2" onclick="go('still')">
            <span class="t-main">ST’ÉXEM</span>
            <span class="t-phonetic">STILL</span>
        </div>
        <div class="btn-2" onclick="go('spark')">
            <span class="t-main">P’ÁX̌WAD</span>
            <span class="t-phonetic">SPARK</span>
        </div>
        <div class="btn-2" onclick="go('weave')">
            <span class="t-main">KW’ÉTL’EN</span>
            <span class="t-phonetic">WEAVE</span>
        </div>
        <div class="btn-2" onclick="go('halt')">
            <span class="t-main">KW’ÉLAP</span>
            <span class="t-phonetic">HALT</span>
        </div>
    </div>

    <div id="scr-still" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <div id="logic-box" style="text-align: center; width: 85%;">
            <div id="q-text"></div>
            <input type="text" id="logic-in" autocomplete="off" oninput="doLogic()">
        </div>
        <div id="f-h" class="feather-h" onclick="hitH()"></div>
    </div>

    <div id="scr-spark" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <div id="spark-ui" style="text-align: center; width: 85%;">
            <textarea id="spark-in" placeholder="WORRY..." onkeypress="doSpark(event)"></textarea>
            <p class="t-phonetic" style="margin-top: 20px; opacity: 0.4;">ENTER TO SHATTER</p>
        </div>
        <div id="f-v" class="feather-v" onclick="hitV()"></div>
    </div>

    <div id="scr-weave" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <div style="z-index: 10; text-align: center; position: absolute; top: 100px; pointer-events: none;">
            <div id="animal-t" style="color: var(--teal); letter-spacing: 5px; font-weight: 900;">RAVEN</div>
            <div id="animal-p" class="t-phonetic">SQUW'AL'QUW</div>
        </div>
        <canvas id="cvs"></canvas>
        <div id="touch-area"></div>
    </div>

    <div id="scr-halt" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <div class="halt-core">
            <div class="halt-label">HALT</div>
            <span class="gaze-dot" style="top: 20%; left: 20%;"></span>
            <span class="gaze-dot" style="top: 20%; right: 20%;"></span>
            <span class="gaze-dot" style="bottom: 20%; left: 20%;"></span>
            <span class="gaze-dot" style="bottom: 20%; right: 20%;"></span>
        </div>
        <div style="margin-top: 60px; text-align: center; width: 70%;">
            <p class="t-phonetic" style="color: var(--red); opacity: 0.8; font-size: 0.8rem;">
                STOP THE BREATH. <br>
                LOCK YOUR GAZE ON THE CENTER.
            </p>
        </div>
        <div id="halt-strobe"></div>
    </div>

    <script>
        let currentAns = "", logicHits = 0, hCount = 0, orbitCount = 0, orbitRadius = 140, drawing = false, path = [];
        const levels = [
            {n:"RAVEN", p:"SQUW'AL'QUW", pts:[{x:0.5, y:0.2}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.8}]},
            {n:"WOLF", p:"STIQÍYU’", pts:[{x:0.2, y:0.4}, {x:0.5, y:0.2}, {x:0.8, y:0.4}, {x:0.7, y:0.7}, {x:0.3, y:0.7}]},
            {n:"ORCA", p:"KW’ELHÚ", pts:[{x:0.5, y:0.2}, {x:0.8, y:0.4}, {x:0.6, y:0.7}, {x:0.4, y:0.7}, {x:0.2, y:0.4}]},
            {n:"EAGLE", p:"YEXWALA", pts:[{x:0.1, y:0.4}, {x:0.3, y:0.3}, {x:0.5, y:0.5}, {x:0.7, y:0.3}, {x:0.9, y:0.4}, {x:0.5, y:0.8}]}
        ];
        let curLvl = 0;
        let lockedSequence = [];
        let pendingLevelAdvance = false;

        function go(s) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(`scr-${s}`).classList.add('active');
            if (s === 'still') initLogic();
            if (s === 'weave') initCanvas();
            if (s === 'halt') triggerHaltEffects();
        }

        function home() {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('scr-home').classList.add('active');
            document.getElementById('f-h').style.display = 'none';
            document.getElementById('f-v').style.display = 'none';
            document.getElementById('spark-ui').style.display = 'block';
            const sparkBox = document.getElementById('spark-in');
            sparkBox.classList.remove('shattering');
            sparkBox.value = '';
            if (haltStrobeInterval) {
                clearInterval(haltStrobeInterval);
                haltStrobeInterval = null;
            }
            if (haltStrobeTimeout) {
                clearTimeout(haltStrobeTimeout);
                haltStrobeTimeout = null;
            }
            const strobe = document.getElementById('halt-strobe');
            if (strobe) strobe.style.opacity = '0';
            drawing = false;
            path = [];
            lockedSequence = [];
            pendingLevelAdvance = false;
        }

        /* --- LOGIC 2.0 --- */
        const taskPool = [
            // 1. MATH
            () => {
                const a = Math.floor(Math.random() * 9) + 4;
                const b = Math.floor(Math.random() * 8) + 3;
                return { q: `${a} x ${b}`, a: (a * b).toString() };
            },
            // 2. REVERSE WORDS
            () => {
                const words = ["RAVEN", "CEDAR", "SALMON", "CANOE", "TOTEM", "EAGLE", "WHALE"];
                const w = words[Math.floor(Math.random() * words.length)];
                return { q: `REV: ${w}`, a: w.split('').reverse().join('') };
            },
            // 3. DOT COUNTING
            () => {
                const n = Math.floor(Math.random() * 6) + 4;
                return { q: "● ".repeat(n), a: n.toString() };
            },
            // 4. SEQUENCING
            () => {
                const start = Math.floor(Math.random() * 10);
                const step = Math.floor(Math.random() * 4) + 2;
                const seq = [start, start + step, start + (step * 2)];
                return { q: `${seq[0]}, ${seq[1]}, ${seq[2]}, ?`, a: (start + (step * 3)).toString() };
            }
        ];

        let haltStrobeInterval = null;
        let haltStrobeTimeout = null;
        function initLogic() {
            logicHits = 0;
            document.getElementById('logic-box').style.display = 'block';
            document.getElementById('f-h').style.display = 'none';
            nextQ();
        }

        function nextQ() {
            const task = taskPool[Math.floor(Math.random() * taskPool.length)]();
            document.getElementById('q-text').innerText = task.q;
            currentAns = task.a;

            const input = document.getElementById('logic-in');
            input.value = "";
            input.placeholder = "?";
            input.focus();
        }

        function doLogic() {
            const val = document.getElementById('logic-in').value.toUpperCase().trim();
            if (val === currentAns) {
                logicHits++;
                if (navigator.vibrate) navigator.vibrate(40);
                document.getElementById('q-text').style.color = 'var(--teal)';

                if (logicHits >= 3) {
                    document.getElementById('logic-box').style.display = 'none';
                    startFH();
                } else {
                    setTimeout(() => {
                        document.getElementById('q-text').style.color = 'var(--gold)';
                        nextQ();
                    }, 200);
                }
            }
        }

        /* --- FEATHERS --- */
        function startFH() {
            hCount = 0;
            document.getElementById('f-h').style.display = 'block';
            moveH();
        }

        function moveH() {
            const f = document.getElementById('f-h');
            f.style.left = hCount % 2 === 0 ? '10%' : '70%';
            f.style.top = '50%';
        }

        function hitH() {
            hCount++;
            if (navigator.vibrate) navigator.vibrate(20);
            if (hCount > 10) home();
            else moveH();
        }

        function doSpark(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const box = document.getElementById('spark-in');
                if (box.value.trim() === '') return;

                box.classList.add('shattering');
                if (navigator.vibrate) navigator.vibrate([30, 100, 50, 200]);
                setTimeout(() => {
                    document.getElementById('spark-ui').style.display = 'none';
                    box.classList.remove('shattering');
                    box.value = '';
                    startOrbitalEMDR();
                }, 800);
            }
        }

        /* --- HALT: SENSORY INTERRUPT --- */
        function triggerHaltEffects() {
            const haltScreen = document.getElementById('scr-halt');
            const strobe = document.getElementById('halt-strobe');
            if (!haltScreen || !strobe) return;

            if (haltStrobeInterval) clearInterval(haltStrobeInterval);
            if (haltStrobeTimeout) clearTimeout(haltStrobeTimeout);

            haltStrobeInterval = setInterval(() => {
                if (!haltScreen.classList.contains('active')) {
                    strobe.style.opacity = '0';
                    clearInterval(haltStrobeInterval);
                    haltStrobeInterval = null;
                    return;
                }

                strobe.style.opacity = '0.15';
                if (navigator.vibrate) navigator.vibrate(60);
                haltStrobeTimeout = setTimeout(() => { strobe.style.opacity = '0'; }, 50);
            }, 4000);
        }

        function startOrbitalEMDR() {
            orbitCount = 0;
            orbitRadius = 140;
            document.getElementById('f-v').style.display = 'block';
            moveOrbit();
        }

        function moveOrbit() {
            const f = document.getElementById('f-v');
            const angle = (orbitCount * 45) * (Math.PI / 180);
            const dynamicRadius = orbitRadius + (Math.sin(orbitCount) * 20);
            const x = Math.cos(angle) * dynamicRadius + (window.innerWidth / 2) - 30;
            const y = Math.sin(angle) * dynamicRadius + (window.innerHeight / 2) - 30;

            f.style.left = x + 'px';
            f.style.top = y + 'px';

            const speed = Math.max(400, 1000 - (orbitCount * 50));
            f.style.transition = `all ${speed}ms ease-in-out`;
        }

        function hitV() {
            orbitCount++;
            if (navigator.vibrate) navigator.vibrate(25);

            if (orbitCount >= 16) {
                document.getElementById('f-v').style.display = 'none';
                home();
            } else {
                moveOrbit();
            }
        }

        function setCurrentLevelLabels() {
            const lvl = levels[curLvl];
            document.getElementById('animal-t').innerText = lvl.n;
            document.getElementById('animal-p').innerText = lvl.p;
        }

        /* --- WEAVE 2.0 --- */
        function initCanvas() {
            const c = document.getElementById('cvs');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            path = [];
            lockedSequence = [0];
            pendingLevelAdvance = false;
            setCurrentLevelLabels();

            const area = document.getElementById('touch-area');
            area.onpointerdown = (e) => {
                drawing = true;
                path = [{x:e.clientX, y:e.clientY}];
            };
            area.onpointermove = (e) => {
                if (!drawing) return;
                const p = {x:e.clientX, y:e.clientY};
                path.push(p);
                tryLockAnchor(p);
            };
            area.onpointerup = () => {
                drawing = false;
                path = [];
            };
            area.onpointercancel = () => {
                drawing = false;
                path = [];
            };
            drawLoop();
        }

        function tryLockAnchor(p) {
            if (pendingLevelAdvance) return;
            const c = document.getElementById('cvs');
            const pts = levels[curLvl].pts;
            const nextIdx = lockedSequence.length;
            if (nextIdx >= pts.length) return;

            const next = pts[nextIdx];
            const nx = next.x * c.width;
            const ny = next.y * c.height;
            const dist = Math.hypot(p.x - nx, p.y - ny);

            if (dist > 40) return;

            lockedSequence.push(nextIdx);
            if (navigator.vibrate) navigator.vibrate(30);

            if (lockedSequence.length >= pts.length) {
                advanceWeaveLevel();
            }
        }

        function advanceWeaveLevel() {
            if (pendingLevelAdvance) return;
            pendingLevelAdvance = true;
            drawing = false;
            path = [];
            if (navigator.vibrate) navigator.vibrate([20, 60, 20]);
            setTimeout(() => {
                curLvl = (curLvl + 1) % levels.length;
                lockedSequence = [0];
                pendingLevelAdvance = false;
                setCurrentLevelLabels();
            }, 700);
        }

        function drawLoop() {
            const c = document.getElementById('cvs');
            if (!c || !document.getElementById('scr-weave').classList.contains('active')) return;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, c.width, c.height);

            if (lockedSequence.length > 1) {
                ctx.strokeStyle = 'var(--gold)';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'var(--gold)';
                ctx.beginPath();
                lockedSequence.forEach((idx, i) => {
                    const p = levels[curLvl].pts[idx];
                    const x = p.x * c.width;
                    const y = p.y * c.height;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            if (path.length > 1) {
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 3;
                ctx.beginPath();
                path.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }

            levels[curLvl].pts.forEach((p, idx) => {
                const isConnected = lockedSequence.includes(idx);
                const isNext = lockedSequence.length === idx;
                ctx.beginPath();
                ctx.arc(p.x * c.width, p.y * c.height, isNext ? 8 : 5, 0, Math.PI * 2);
                if (isConnected) ctx.fillStyle = 'var(--gold)';
                else if (isNext) ctx.fillStyle = 'var(--teal)';
                else ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fill();
            });

            requestAnimationFrame(drawLoop);
        }
    </script>
</body>
</html>
