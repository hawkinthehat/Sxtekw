<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | The Quiet</title>
    <style>
        :root { --bg: #020617; --jade: #00A36C; --gold: #fbbf24; --text: #f1f5f9; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.6s ease; z-index: 10; }
        .active { display: flex; opacity: 1; }

        .btn-hilu { position: absolute; top: 30px; left: 30px; background: rgba(0, 163, 108, 0.1); border: 1px solid var(--jade); color: var(--jade); padding: 10px 20px; border-radius: 50px; font-size: 0.7rem; letter-spacing: 2px; z-index: 1000; cursor: pointer; }

        .home-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; height: 100%; }
        .quad-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; border: 0.5px solid rgba(0, 163, 108, 0.2); cursor: pointer; }
        .quad-title { font-size: 1.2rem; letter-spacing: 5px; font-weight: 900; color: var(--jade); margin: 0; }
        .quad-sub { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.5; margin-top: 10px; text-transform: uppercase; }

        .instr-card { background: rgba(0, 163, 108, 0.05); border: 2px solid var(--jade); padding: 20px; border-radius: 20px; max-width: 280px; text-align: center; z-index: 20; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #spark-target { position: absolute; width: 50px; height: 50px; background: var(--jade); border-radius: 50%; box-shadow: 0 0 30px var(--jade); cursor: pointer; z-index: 30; display: none; }
        
        input, textarea { background: none; border: 1px solid #333; color: white; border-radius: 10px; padding: 10px; outline: none; }
        input:focus, textarea:focus { border-color: var(--jade); }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active" style="padding:0;">
        <div class="home-grid">
            <div class="quad-btn" onclick="startSection('weave')">
                <span class="quad-title">KW’ÉTL’EN</span>
                <span class="quad-sub">WEAVE</span>
            </div>
            <div class="quad-btn" onclick="startSection('paxwad')" style="border-left:none;">
                <span class="quad-title" style="color: var(--gold);">P’ÁX̌WAD</span>
                <span class="quad-sub">SPARK</span>
            </div>
            <div class="quad-btn" onclick="startSection('stexem')" style="border-top:none;">
                <span class="quad-title" style="color: var(--gold);">ST’ÉXEM</span>
                <span class="quad-sub">STILL</span>
            </div>
            <div class="quad-btn" onclick="startSection('kwelap')" style="border-top:none; border-left:none;">
                <span class="quad-title">KW’ÉLAP</span>
                <span class="quad-sub">HALT</span>
            </div>
        </div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="z-index: 100; text-align: center; position: absolute; top: 100px; pointer-events: none;">
            <h2 id="animal-name" style="color: var(--gold); letter-spacing: 8px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);"></h2>
        </div>
        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer"></div>
    </div>

    <div id="screen-paxwad" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div id="paxwad-instr" class="instr-card">
            <span style="color: var(--gold); font-weight: 900;">STILLNESS RULE:</span><br>
            Keep head still. Follow with eyes only.
        </div>
        <div id="spark-target" onclick="hitSpark()"></div>
        <div id="spark-count" style="position: absolute; bottom: 50px; color: var(--jade); letter-spacing: 4px;">0 / 10</div>
    </div>

    <div id="screen-stexem" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div class="instr-card" style="border-color: var(--gold);">
            <p id="logic-question" style="font-size: 1.8rem; color: var(--gold); margin: 0;"></p>
            <input type="number" id="logic-answer" pattern="[0-9]*" inputmode="numeric" style="width: 80px; margin-top: 15px; text-align: center; font-size: 1.5rem;">
            <button onclick="checkLogic()" style="display: block; margin: 20px auto 0; background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold;">SUBMIT</button>
        </div>
    </div>

    <div id="screen-kwelap" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div class="instr-card" style="border-color: var(--text); width: 80%;">
            <p style="opacity: 0.7; font-size: 0.8rem;">NAME THE THOUGHT</p>
            <textarea id="halt-thought" placeholder="..." style="width: 100%; height: 100px;"></textarea>
            <p style="font-size: 0.6rem; opacity: 0.4; margin-top: 10px;">Watch it dissolve.</p>
        </div>
    </div>

    <script>
        const totems = [
            { name: "SQUWAL'QUW", points: [{x:0.5, y:0.2}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.8}, {x:0.5, y:0.2}] },
            { name: "STIQÍYU’", points: [{x:0.2, y:0.5}, {x:0.4, y:0.3}, {x:0.6, y:0.3}, {x:0.8, y:0.5}, {x:0.5, y:0.8}, {x:0.2, y:0.5}] },
            { name: "QW’ULH-LÚ-MUCW", points: [{x:0.2, y:0.7}, {x:0.5, y:0.3}, {x:0.8, y:0.7}, {x:0.5, y:0.9}, {x:0.2, y:0.7}] },
            { name: "YÍXWULA", points: [{x:0.1, y:0.3}, {x:0.5, y:0.5}, {x:0.9, y:0.3}, {x:0.5, y:0.8}, {x:0.1, y:0.3}] }
        ];

        let currentLevel = 0;
        let sparkCount = 0;
        let isDrawing = false;
        let userPath = [];
        let completedLines = [];
        let touchLayerBound = false;

        function startSection(type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${type}`).classList.add('active');
            if(type === 'weave') initWeave();
            if(type === 'paxwad') initSpark();
            if(type === 'stexem') initLogic();
        }

        function exitToHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-home').classList.add('active');
            document.getElementById('spark-target').style.display = 'none';
            isDrawing = false;
            userPath = [];
            completedLines = [];
        }

        function initWeave() {
            const canvas = document.getElementById('weave-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            isDrawing = false;
            userPath = [];
            completedLines = [];
            document.getElementById('animal-name').innerText = totems[currentLevel].name;
            bindTouchLayer();
            renderWeave();
        }

        function bindTouchLayer() {
            if (touchLayerBound) return;
            touchLayerBound = true;
            const layer = document.getElementById('touch-layer');
            if (!layer) return;

            layer.onpointerdown = (e) => {
                if (!document.getElementById('screen-weave').classList.contains('active')) return;
                isDrawing = true;
                userPath = [{ x: e.clientX, y: e.clientY }];
            };

            layer.onpointermove = (e) => {
                if (!isDrawing || !document.getElementById('screen-weave').classList.contains('active')) return;
                const pos = { x: e.clientX, y: e.clientY };
                userPath.push(pos);
                checkSnap(pos);
            };

            layer.onpointerup = () => {
                if (isDrawing && userPath.length > 0) {
                    completedLines.push([...userPath]);
                }
                isDrawing = false;
                userPath = [];
            };

            layer.onpointercancel = layer.onpointerup;
        }

        function checkSnap(pos) {
            const canvas = document.getElementById('weave-canvas');
            if (!canvas) return;
            const totem = totems[currentLevel];
            let isNearAnyPoint = false;
            totem.points.forEach((p) => {
                const tx = p.x * canvas.width;
                const ty = p.y * canvas.height;
                const dist = Math.hypot(pos.x - tx, pos.y - ty);
                if (dist < 40) isNearAnyPoint = true;
            });
            if (isNearAnyPoint && navigator.vibrate) navigator.vibrate(15);
        }

        function renderWeave() {
            const canvas = document.getElementById('weave-canvas');
            if (!canvas || !document.getElementById('screen-weave').classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(0, 163, 108, 0.15)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 15]);
            const totem = totems[currentLevel];
            ctx.beginPath();
            totem.points.forEach((p, i) => {
                const x = p.x * canvas.width;
                const y = p.y * canvas.height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.setLineDash([]);

            completedLines.forEach((line) => {
                if (line.length < 2) return;
                ctx.beginPath();
                line.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.strokeStyle = 'rgba(251, 191, 36, 0.35)';
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.stroke();
            });

            if (isDrawing && userPath.length > 1) {
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 4;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fbbf24';
                ctx.beginPath();
                userPath.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(renderWeave);
        }

        function initSpark() {
            sparkCount = 0;
            document.getElementById('spark-count').innerText = "0 / 10";
            document.getElementById('paxwad-instr').style.opacity = 1;
            document.getElementById('spark-target').style.display = 'block';
            moveSpark();
        }

        function hitSpark() {
            sparkCount++;
            document.getElementById('spark-count').innerText = `${sparkCount} / 10`;
            if (navigator.vibrate) navigator.vibrate(20);
            if (sparkCount >= 3) document.getElementById('paxwad-instr').style.opacity = 0;
            if (sparkCount >= 10) exitToHome(); else moveSpark();
        }

        function moveSpark() {
            const t = document.getElementById('spark-target');
            t.style.left = (Math.random() * (innerWidth-100)+50) + 'px';
            t.style.top = (Math.random() * (innerHeight-100)+50) + 'px';
        }

        function initLogic() {
            const a = Math.floor(Math.random() * 12) + 1;
            const b = Math.floor(Math.random() * 12) + 1;
            document.getElementById('logic-question').innerText = `${a} x ${b}`;
            window.correctResult = a * b;
            document.getElementById('logic-answer').value = "";
            document.getElementById('logic-answer').focus();
        }

        function checkLogic() {
            const ans = parseInt(document.getElementById('logic-answer').value);
            if(ans === window.correctResult) {
                if (navigator.vibrate) navigator.vibrate(30);
                initLogic();
            }
        }
    </script>
</body>
</html>
