<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | The Quiet</title>
    <style>
        :root { --bg: #000; --jade: #00A36C; --gold: #fbbf24; --text: #f1f5f9; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s ease; z-index: 10; }
        .active { display: flex; opacity: 1; }

        /* HOME PAGE / LAUNCHPAD */
        .launch-btn { width: 280px; padding: 20px; margin: 8px 0; border: 1px solid rgba(0, 163, 108, 0.3); background: #050505; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .launch-btn:active { background: #111; border-color: var(--jade); }
        .btn-title { font-size: 1rem; letter-spacing: 6px; font-weight: 900; color: var(--jade); }
        .btn-sub { font-size: 0.5rem; letter-spacing: 3px; opacity: 0.4; margin-top: 5px; }

        /* PHONETIC TAGS */
        .phonetic-guide { font-size: 0.55rem; letter-spacing: 3px; color: var(--gold); opacity: 0.6; margin-top: 4px; text-transform: uppercase; font-weight: normal; }

        /* UI ELEMENTS */
        .btn-hilu { position: absolute; top: 30px; left: 30px; background: none; border: 1px solid #222; color: #444; padding: 8px 15px; border-radius: 4px; font-size: 0.55rem; letter-spacing: 2px; z-index: 1000; cursor: pointer; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        /* EMDR FEATHER */
        #feather-target {
            position: absolute; width: 70px; height: 15px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 50%; filter: blur(1px);
            box-shadow: 0 0 15px var(--gold);
            display: none; z-index: 30;
            transition: all 1.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        #logo-container {
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        #logo-container.mantra-on {
            filter: drop-shadow(0 0 14px rgba(251, 191, 36, 0.55));
        }
        .mantra-hint {
            margin-top: 10px;
            font-size: 0.5rem;
            letter-spacing: 2px;
            opacity: 0.35;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        input { background: none; border-bottom: 2px solid var(--gold); border-top:none; border-left:none; border-right:none; color: white; width: 120px; text-align: center; font-size: 2rem; outline: none; margin-top: 15px; }
        textarea { background: none; border: 1px solid #222; color: white; width: 80%; height: 100px; padding: 15px; outline: none; font-size: 1rem; text-align: center; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div id="logo-container" style="margin-bottom: 40px; text-align: center;" onclick="toggleMantra()">
            <div style="font-size: 1.5rem; color: var(--gold); border: 2px solid var(--jade); padding: 15px; border-radius: 50%; width: 50px; height: 50px; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto; box-shadow: 0 0 20px rgba(0, 163, 108, 0.2);">
                JA
            </div>
            <h1 style="letter-spacing: 12px; color: var(--jade); font-weight: 900; margin-top: 15px; margin-bottom: 0;">SXT’EKW</h1>
            <div class="phonetic-guide">[ suh-t-ekw ]</div>
            <div class="mantra-hint">TAP SIGIL TO TOGGLE MANTRA ENGINE</div>
        </div>

        <div class="launch-btn" onclick="startSection('weave')">
            <span class="btn-title">KW’ÉTL’EN</span>
            <div class="phonetic-guide" style="font-size: 0.45rem;">[ kw-et-lun ]</div>
            <span class="btn-sub">WEAVE</span>
        </div>
        <div class="launch-btn" onclick="startSection('paxwad')">
            <span class="btn-title" style="color: var(--gold);">P’ÁX̌WAD</span>
            <div class="phonetic-guide" style="font-size: 0.45rem;">[ pah-hwah-d ]</div>
            <span class="btn-sub">SPARK</span>
        </div>
        <div class="launch-btn" onclick="startSection('stexem')">
            <span class="btn-title" style="color: var(--gold);">ST’ÉXEM</span>
            <div class="phonetic-guide" style="font-size: 0.45rem;">[ st-eh-hum ]</div>
            <span class="btn-sub">STILL</span>
        </div>
        <div class="launch-btn" onclick="startSection('kwelap')">
            <span class="btn-title">KW’ÉLAP</span>
            <div class="phonetic-guide" style="font-size: 0.45rem;">[ kw-ay-lap ]</div>
            <span class="btn-sub">HALT</span>
        </div>
    </div>

    <div id="screen-weave" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="z-index: 100; text-align: center; position: absolute; top: 100px;">
            <h2 id="animal-name" style="color: var(--gold); letter-spacing: 6px; margin-bottom: 0;"></h2>
            <div id="animal-phonetic" class="phonetic-guide" style="margin-top: 8px;"></div>
        </div>
        <canvas id="weave-canvas"></canvas>
        <div id="touch-layer"></div>
    </div>

    <div id="screen-paxwad" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div id="feather-target" onclick="hitFeather()"></div>
        <div id="spark-count" style="position: absolute; bottom: 50px; color: #222; letter-spacing: 5px; font-size: 0.6rem;">0 / 10</div>
    </div>

    <div id="screen-stexem" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="text-align: center; z-index: 20;">
            <p id="logic-question" style="font-size: 2rem; color: var(--gold); margin: 0;"></p>
            <input type="number" id="logic-answer" pattern="[0-9]*" inputmode="numeric" oninput="checkLogicInstant()">
        </div>
    </div>

    <div id="screen-kwelap" class="screen">
        <button class="btn-hilu" onclick="exitToHome()">HÍLU</button>
        <div style="text-align: center; width: 100%; z-index: 20;">
            <textarea id="halt-thought" placeholder="..." onkeydown="handleHalt(event)"></textarea>
            <p style="font-size: 0.5rem; opacity: 0.2; letter-spacing: 2px; margin-top: 20px;">ENTER TO UNWEAVE</p>
        </div>
    </div>

    <script>
        const totems = [
            { name: "SQUWAL'QUW", phonetic: "[ sk-wahl-koo ]", points: [{x:0.5, y:0.2}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.8}, {x:0.5, y:0.2}] },
            { name: "STIQIYU'", phonetic: "[ stee-kee-yoo ]", points: [{x:0.1, y:0.4}, {x:0.9, y:0.4}, {x:0.5, y:0.8}, {x:0.1, y:0.4}] }
        ];

        let currentLevel = 0;
        let isDrawing = false;
        let userPath = [];
        let sparkCount = 0;
        const rootStyle = getComputedStyle(document.documentElement);
        const goldColor = rootStyle.getPropertyValue('--gold').trim() || '#fbbf24';

        function startSection(type) {
            setMantraMode(false);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${type}`).classList.add('active');
            if(type === 'weave') initWeave();
            if(type === 'paxwad') initFeather();
            if(type === 'stexem') initLogic();
        }

        function exitToHome() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-home').classList.add('active');
            document.getElementById('feather-target').style.display = 'none';
            isDrawing = false;
            userPath = [];
        }

        /* --- WEAVE --- */
        function initWeave() {
            const canvas = document.getElementById('weave-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.getElementById('animal-name').innerText = totems[currentLevel].name;
            document.getElementById('animal-phonetic').innerText = totems[currentLevel].phonetic;
            const layer = document.getElementById('touch-layer');
            layer.onpointerdown = (e) => {
                isDrawing = true;
                userPath = [{x: e.clientX, y: e.clientY}];
            };
            layer.onpointermove = (e) => {
                if(isDrawing) userPath.push({x: e.clientX, y: e.clientY});
            };
            layer.onpointerup = () => {
                isDrawing = false;
            };
            layer.onpointercancel = () => {
                isDrawing = false;
            };
            renderWeave();
        }

        function renderWeave() {
            const canvas = document.getElementById('weave-canvas');
            if(!canvas || !document.getElementById('screen-weave').classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            if(isDrawing && userPath.length > 1) {
                ctx.strokeStyle = goldColor;
                ctx.lineWidth = 4;
                ctx.beginPath();
                userPath.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
            requestAnimationFrame(renderWeave);
        }

        /* --- FEATHER --- */
        let fSide = 0;
        function initFeather() {
            sparkCount = 0;
            document.getElementById('spark-count').innerText = '0 / 10';
            document.getElementById('feather-target').style.display = 'block';
            moveFeather();
        }

        function moveFeather() {
            const f = document.getElementById('feather-target');
            fSide = fSide === 0 ? 1 : 0;
            f.style.left = fSide === 0 ? '10%' : '80%';
            f.style.top = (Math.random() * 40 + 30) + '%';
        }

        function hitFeather() {
            sparkCount++;
            document.getElementById('spark-count').innerText = `${sparkCount} / 10`;
            if (navigator.vibrate) navigator.vibrate(20);
            if(sparkCount >= 10) exitToHome(); else moveFeather();
        }

        /* --- LOGIC --- */
        const tasks = [
            { q: () => {
                const a = Math.floor(Math.random() * 9) + 3;
                const b = Math.floor(Math.random() * 8) + 3;
                return { t: `${a} x ${b}`, a: a * b };
            }},
            { q: () => {
                const n = Math.floor(Math.random() * 6) + 4;
                return { t: '● '.repeat(n), a: n };
            }}
        ];

        function initLogic() {
            const task = tasks[Math.floor(Math.random() * tasks.length)].q();
            document.getElementById('logic-question').innerText = task.t;
            window.ans = task.a;
            document.getElementById('logic-answer').value = '';
            document.getElementById('logic-answer').focus();
        }

        function checkLogicInstant() {
            if(parseInt(document.getElementById('logic-answer').value, 10) === window.ans) {
                if (navigator.vibrate) navigator.vibrate(40);
                setTimeout(initLogic, 200);
            }
        }

        /* --- HALT --- */
        function handleHalt(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const box = document.getElementById('halt-thought');
                box.style.transform = 'scale(0) translateY(-100px)';
                box.style.opacity = '0';
                box.style.transition = 'all 1.5s ease-in';
                if (navigator.vibrate) navigator.vibrate([10, 50, 10]);
                setTimeout(() => {
                    box.value = '';
                    box.style.transform = '';
                    box.style.opacity = '1';
                    box.style.transition = '';
                }, 1600);
            }
        }

        // --- KINETIC MANTRA ENGINE ---
        let isMantraMode = false;
        let bpm = 128;
        let audioCtx = null;
        let mantraTimer = null;

        function setMantraMode(nextState) {
            if (isMantraMode === nextState) return;
            isMantraMode = nextState;
            const logo = document.getElementById('logo-container');

            if (isMantraMode) {
                logo.classList.add('mantra-on');
                logo.style.animation = `pulse ${60 / bpm}s infinite`;
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                scheduleDrumBeat();
            } else {
                logo.classList.remove('mantra-on');
                logo.style.animation = 'none';
                if (mantraTimer) {
                    clearTimeout(mantraTimer);
                    mantraTimer = null;
                }
            }
        }

        function toggleMantra() {
            setMantraMode(!isMantraMode);
        }

        function scheduleDrumBeat() {
            if (!isMantraMode) return;
            playDrumBeat();
            mantraTimer = setTimeout(scheduleDrumBeat, (60 / bpm) * 1000);
        }

        // Minimalist Drum Synth for that "Tribe Called Red" Kick
        function playDrumBeat() {
            if (!isMantraMode || !audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;

            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(45, now + 0.2);

            gain.gain.setValueAtTime(0.55, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + 0.21);
        }
    </script>
</body>
</html>
