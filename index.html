<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SXT’EKW | Slate 2.0</title>
    <style>
        :root { 
            /* THE NEW CALMING BASE */
            --bg: #121212; 
            --teal: #0d9488; 
            --gold: #fbbf24; 
            --red: #f43f5e; 
            --text: #e2e8f0; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; opacity: 0; transition: opacity 0.3s; }
        .active { display: flex; opacity: 1; }

        /* THE HEARTBEAT LOGO */
        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            12% { transform: scale(1.1); filter: brightness(1.4); box-shadow: 0 0 25px var(--teal); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .logo-pulse { width: 85px; height: 85px; border: 2px solid var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 0.468s infinite; margin-bottom: 20px; background: rgba(0,0,0,0.2); }

        /* BUTTONS */
        .btn-2 { width: 265px; padding: 20px; margin: 10px 0; border: 1px solid #222; background: #1a1a1a; text-align: center; cursor: pointer; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-2:active { background: #252525; border-color: var(--teal); transform: scale(0.98); }
        .t-main { font-size: 1rem; letter-spacing: 5px; font-weight: 900; color: var(--teal); display: block; }
        .t-phonetic { font-size: 0.65rem; letter-spacing: 2px; color: var(--gold); margin-top: 4px; display: block; opacity: 0.9; }

        /* LOGIC & FEATHERS */
        #q-text { font-size: 1.8rem; color: var(--gold); margin-bottom: 20px; text-align: center; font-weight: 900; letter-spacing: 2px; }
        #logic-in { background: none; border-bottom: 2px solid var(--gold); border-top:none; border-left:none; border-right:none; color: #fff; width: 70%; text-align: center; font-size: 2.4rem; outline: none; }
        
        .feather-h { position: absolute; width: 95px; height: 12px; background: var(--teal); border-radius: 20px; box-shadow: 0 0 25px var(--teal); display: none; transition: all 1.1s cubic-bezier(0.65, 0, 0.35, 1); filter: blur(1px); }
        .feather-v { position: absolute; width: 75px; height: 75px; border: 4px solid var(--teal); border-radius: 50%; box-shadow: 0 0 30px var(--teal); display: none; transition: all 1.5s ease-in-out; }

        /* THE EXPLOSION */
        @keyframes explode-v2 {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            100% { transform: scale(4); opacity: 0; filter: blur(35px); color: var(--red); }
        }
        .is-exploding { animation: explode-v2 0.75s forwards; }

        .btn-back { position: absolute; top: 40px; left: 30px; background: none; border: 1px solid #333; color: #666; padding: 10px 16px; font-size: 0.6rem; letter-spacing: 3px; z-index: 1000; border-radius: 20px; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        #touch-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>

    <div id="scr-home" class="screen active">
        <div class="logo-pulse"><span style="color: var(--gold); font-weight: 900; font-size: 0.75rem;">SXT’EKW</span></div>
        <div class="t-phonetic" style="margin-bottom: 30px; opacity: 0.6;">[ suh-t-ekw ]</div>

        <div class="btn-2" onclick="go('still')">
            <span class="t-main">ST’ÉXEM</span>
            <span class="t-phonetic">STILL</span>
        </div>
        <div class="btn-2" onclick="go('spark')">
            <span class="t-main">P’ÁX̌WAD</span>
            <span class="t-phonetic">SPARK</span>
        </div>
        <div class="btn-2" onclick="go('weave')">
            <span class="t-main">KW’ÉTL’EN</span>
            <span class="t-phonetic">WEAVE</span>
        </div>
        <div class="btn-2" onclick="go('halt')">
            <span class="t-main">KW’ÉLAP</span>
            <span class="t-phonetic">HALT</span>
        </div>
    </div>

    <div id="scr-still" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <div id="logic-box" style="text-align: center; width: 85%;">
            <div id="q-text"></div>
            <input type="text" id="logic-in" autocomplete="off" oninput="doLogic()">
            <div id="logic-progress" style="margin-top: 30px; color: var(--teal); letter-spacing: 10px; opacity: 0.3;">○ ○ ○</div>
        </div>
        <div id="f-h" class="feather-h" onclick="hitH()"></div>
    </div>

    <div id="scr-spark" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <div id="spark-ui" style="text-align: center; width: 85%;">
            <textarea id="spark-in" placeholder="TYPE THE WEIGHT..." onkeypress="doSpark(event)" style="background: rgba(0,0,0,0.2); border: 1px solid #333; color: white; width: 100%; height: 120px; padding: 20px; text-align: center; font-size: 1.2rem; outline: none; border-radius: 8px;"></textarea>
            <p class="t-phonetic" style="margin-top: 25px; opacity: 0.4;">ENTER TO UNRAVEL</p>
        </div>
        <div id="f-v" class="feather-v" onclick="hitV()"></div>
    </div>

    <div id="scr-weave" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <div style="z-index: 10; text-align: center; position: absolute; top: 110px; pointer-events: none;">
            <div id="animal-t" style="color: var(--teal); letter-spacing: 6px; font-weight: 900; font-size: 1.2rem;">RAVEN</div>
            <div id="animal-p" class="t-phonetic">SQUW'AL'QUW</div>
        </div>
        <canvas id="cvs"></canvas>
        <div id="touch-area"></div>
    </div>

    <div id="scr-halt" class="screen">
        <button class="btn-back" onclick="home()">HÍLU</button>
        <h1 style="color: var(--red); letter-spacing: 15px; font-weight: 900; font-size: 2.5rem;">HALT</h1>
        <div style="margin-top: 50px; width: 10px; height: 10px; background: #222; border-radius: 50%;"></div>
    </div>

    <script>
        let currentAns = "", logicHits = 0, hCount = 0, vCount = 0, drawing = false, path = [];
        const levels = [
            {n:"RAVEN", p:"SQUW'AL'QUW", pts:[{x:0.5, y:0.25}, {x:0.3, y:0.5}, {x:0.7, y:0.5}, {x:0.5, y:0.8}, {x:0.5, y:0.25}]},
            {n:"WOLF", p:"STIQÍYU’", pts:[{x:0.2, y:0.45}, {x:0.5, y:0.2}, {x:0.8, y:0.45}, {x:0.5, y:0.85}, {x:0.2, y:0.45}]}
        ];
        let curLvl = 0;

        /* --- DYNAMIC LOGIC POOL --- */
        const taskPool = [
            () => { const a=Math.floor(Math.random()*8)+4, b=Math.floor(Math.random()*7)+3; return {q:`${a} x ${b}`, a:(a*b).toString()}; },
            () => { const w=["RAVEN","CEDAR","SALMON","CANOE"]; const r=w[Math.floor(Math.random()*w.length)]; return {q:`REV: ${r}`, a:r.split('').reverse().join('')}; },
            () => { const n=Math.floor(Math.random()*5)+4; return {q:"● ".repeat(n), a:n.toString()}; },
            () => { const s=Math.floor(Math.random()*10), t=Math.floor(Math.random()*3)+2; return {q:`${s}, ${s+t}, ${s+t*2}, ?`, a:(s+t*3).toString()}; }
        ];

        function go(s) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(`scr-${s}`).classList.add('active');
            if(s==='still') initLogic();
            if(s==='weave') initCanvas();
        }

        function home() {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('scr-home').classList.add('active');
            document.getElementById('f-h').style.display = 'none';
            document.getElementById('f-v').style.display = 'none';
            document.getElementById('spark-ui').style.display = 'block';
            document.getElementById('logic-box').style.display = 'block';
        }

        /* --- LOGIC ENGINE --- */
        function initLogic() {
            logicHits = 0; document.getElementById('logic-progress').innerText = "○ ○ ○";
            nextQ();
        }
        function nextQ() {
            const task = taskPool[Math.floor(Math.random()*taskPool.length)]();
            document.getElementById('q-text').innerText = task.q;
            currentAns = task.a; document.getElementById('logic-in').value = "";
            document.getElementById('logic-in').focus();
        }
        function doLogic() {
            const val = document.getElementById('logic-in').value.toUpperCase().trim();
            if(val === currentAns) {
                logicHits++; if(navigator.vibrate) navigator.vibrate(40);
                document.getElementById('logic-progress').innerText = "● ".repeat(logicHits) + "○ ".repeat(3-logicHits);
                if(logicHits >= 3) { document.getElementById('logic-box').style.display = 'none'; startFH(); }
                else setTimeout(nextQ, 200);
            }
        }

        /* --- EMDR FEATHERS --- */
        function startFH() { hCount = 0; document.getElementById('f-h').style.display = 'block'; moveH(); }
        function moveH() {
            const f = document.getElementById('f-h');
            f.style.left = hCount % 2 === 0 ? '10%' : '72%'; f.style.top = '50%';
        }
        function hitH() { hCount++; if(navigator.vibrate) navigator.vibrate(20); if(hCount > 12) home(); else moveH(); }

        function doSpark(e) {
            if(e.key === 'Enter') {
                e.preventDefault(); const box = document.getElementById('spark-in');
                box.classList.add('is-exploding'); if(navigator.vibrate) navigator.vibrate([40,80,40]);
                setTimeout(() => { 
                    box.classList.remove('is-exploding'); box.value = "";
                    document.getElementById('spark-ui').style.display = 'none';
                    startFV();
                }, 750);
            }
        }
        function startFV() { vCount = 0; document.getElementById('f-v').style.display = 'block'; moveV(); }
        function moveV() {
            const f = document.getElementById('f-v');
            const angle = (vCount * 45) * (Math.PI / 180);
            f.style.left = (Math.cos(angle) * 110 + (window.innerWidth/2) - 37) + "px";
            f.style.top = (Math.sin(angle) * 110 + (window.innerHeight/2) - 37) + "px";
        }
        function hitV() { vCount++; if(navigator.vibrate) navigator.vibrate(20); if(vCount > 14) home(); else moveV(); }

        /* --- WEAVE ENGINE --- */
        function initCanvas() {
            const c = document.getElementById('cvs'); c.width = window.innerWidth; c.height = window.innerHeight;
            path = [];
            const area = document.getElementById('touch-area');
            area.onpointerdown = (e) => { drawing = true; path.push({x:e.clientX, y:e.clientY}); };
            area.onpointermove = (e) => { if(drawing) path.push({x:e.clientX, y:e.clientY}); };
            area.onpointerup = () => drawing = false;
            drawLoop();
        }
        function drawLoop() {
            const c = document.getElementById('cvs'); if(!c || !document.getElementById('scr-weave').classList.contains('active')) return;
            const ctx = c.getContext('2d'); ctx.fillStyle = 'var(--bg)'; ctx.fillRect(0,0,c.width,c.height);
            levels[curLvl].pts.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x*c.width, p.y*c.height, 5, 0, 7);
                ctx.fillStyle = 'rgba(251, 191, 36, 0.4)'; ctx.fill();
            });
            if(path.length > 1) {
                ctx.strokeStyle = 'var(--gold)'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.beginPath();
                path.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
            requestAnimationFrame(drawLoop);
        }
    </script>
</body>
</html>
